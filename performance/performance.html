<!DOCTYPE html>

<style>
  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden; 
    background-color: #9e9e9e; /* Your grey background */
  }

  #viewport {
    width: 100vw; height: 100vh;
    cursor: grab;
    overflow: auto;
    display: block;
    -ms-overflow-style: none; scrollbar-width: none; /* Hide scrollbars */
  }
  #viewport::-webkit-scrollbar { display: none; }

  #map-container {
    /* We make the container larger than the screen to allow dragging */
    width: 1800px; 
    position: relative;
    line-height: 0;
    display: block; /* Ensures container takes up space */
  }

  #map-image {
    width: 100%;
    height: auto;
    -webkit-user-drag: none;
    user-select: none;
    display: block; /* Important: removes tiny gaps at bottom */
  }

  /* SVG layer perfectly matches the image */
  #interaction-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10; /* This forces it to the front */
  }

/* THE WINDOW LIGHTS */
  .window-light {
    fill: #ffdb1d; /* Yellow */
    opacity: 0;    /* Hidden by default */
    pointer-events: all; /* Important: makes it clickable/hoverable */
    cursor: pointer;
    filter: blur(2px) drop-shadow(0 0 10px #ffdb1d);
    transition: opacity 0.4s ease;
  } 

  .window-light:hover:not(.lit) {
    opacity: 0.3; /* Subtle glow on hover */
  }


   /* THE "LIT" STATE (Added by JavaScript) */
  .window-light.lit {
    opacity: 0.8 !important;
    filter: blur(2px) drop-shadow(0 0 10px #ffdb1d);
  }

</style>

<script>
  const viewport = document.querySelector('#viewport');
  const mapImage = document.querySelector('#map-image');
  const mapContainer = document.querySelector('#map-container');
  const svg = document.querySelector('#interaction-svg');

  // composition
  let composition = [];

  // 1. COORDINATE TRACKER
  function initMapLayout() {
    const naturalWidth = mapImage.naturalWidth;
    const naturalHeight = mapImage.naturalHeight;
    svg.setAttribute('viewBox', `0 0 ${naturalWidth} ${naturalHeight}`);

    const scrollCenter = (mapContainer.offsetWidth - viewport.clientWidth) / 2;
    viewport.scrollLeft = scrollCenter;
    viewport.scrollTop = 0; 
  }

  if (mapImage.complete) { initMapLayout(); } 
  else { mapImage.onload = initMapLayout; }

  function playNote(noteIndex) {
    const audio = new Audio(`sounds/note${noteIndex}.mp3`);
    audio.volume = 0.4;
    audio.play().catch(() => { });
  }

   function activateLights() {
    const lights = document.querySelectorAll('.window-light');
    lights.forEach((light) => {
      const cx = parseFloat(light.getAttribute('cx'));
      const noteHandle = Math.floor((cx / 1536) * 7) + 1; 

      light.addEventListener('mousedown', (e) => {
        e.stopPropagation(); 
        
        if (!light.classList.contains('lit')) {
          light.classList.add('lit');
          playNote(noteHandle); 
          composition.push({ note: noteHandle, time: Date.now() }); 
        }
      });
    });
  }
  activateLights();

  // DRAG-TO-PAN LOGIC
  let isDown = false;
  let startX, startY, scrollLeft, scrollTop;

  viewport.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('window-light')) return;
    isDown = true;
    viewport.style.cursor = 'grabbing';
    startX = e.pageX - viewport.offsetLeft;
    startY = e.pageY - viewport.offsetTop;
    scrollLeft = viewport.scrollLeft;
    scrollTop = viewport.scrollTop;
  });

  viewport.addEventListener('mouseleave', () => isDown = false);
  viewport.addEventListener('mouseup', () => { isDown = false; viewport.style.cursor = 'grab'; });

  viewport.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - viewport.offsetLeft;
    const y = e.pageY - viewport.offsetTop;
    viewport.scrollLeft = scrollLeft - (x - startX) * 1.5;
    viewport.scrollTop = scrollTop - (y - startY) * 1.5;
  });

  // 3. STACKABLE AUDIO LOGIC
  // Replace 'hum.mp3' with your actual sound file paths
      
      // Smooth Fade In
      

    window.addEventListener('resize', () => {
      const scrollCenter = (mapContainer.offsetWidth - viewport.clientWidth) / 2;
      viewport.scrollLeft = scrollCenter;
    });

</script>
