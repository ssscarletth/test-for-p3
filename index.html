<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Symphony</title>
<style>
@font-face{font-family:'Jersey10';src:url('./Jersey10-Regular.ttf') format('truetype')}
*{margin:0;padding:0;overflow:hidden}
body{background:#2a3040;transition:background 1s}
#splash{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#1a2030;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 1.2s}
#splash *{image-rendering:pixelated}
#splash h1{color:#c8d0e0;font-family:'Jersey10',sans-serif;font-size:64px;letter-spacing:10px;text-transform:uppercase;margin-bottom:6px;text-shadow:3px 3px 0 #0a0a18;transition:all .9s cubic-bezier(.4,.7,.2,1)}
#splash h2{color:#8890b0;font-family:'Jersey10',sans-serif;font-size:22px;letter-spacing:8px;text-transform:uppercase;margin-bottom:40px;transition:all .9s cubic-bezier(.4,.7,.2,1)}
#splash.choosing h1,#splash.choosing h2{opacity:0;transform:translateY(-30px);pointer-events:none;position:absolute}
#splash .play-wrap{position:relative;width:80px;height:80px;cursor:pointer;transition:opacity .6s,transform .6s}
#splash.choosing .play-wrap{opacity:0;transform:scale(.5);pointer-events:none;position:absolute}
#splash .play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;color:#8898c0;filter:drop-shadow(2px 1px 0 #1a1a30);animation:noteBob 2s ease-in-out infinite}
#splash .play-wrap:hover .play-btn{color:#c0d0f0}
@keyframes noteBob{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-5px)}}
#splash .stars{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;pointer-events:none}
#splash .star{position:absolute;background:#ffffff;animation:twinkle 2s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.1}100%{opacity:.8}}
#splash .map-stage{display:flex;gap:50px;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1s .25s;padding:20px 0}
#splash.choosing .map-stage{opacity:1;pointer-events:auto}
#splash .map3d{width:150px;height:170px;cursor:pointer;padding:6px;transition:transform .25s ease-out}
#splash .map3d:hover{animation:bounceLego .55s ease-in-out infinite}
#splash .map3d.no-arm:hover{animation:none}
@keyframes bounceLego{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#sc{width:100vw;height:100vh;cursor:grab;position:relative}
#sc.dr{cursor:grabbing}
#cv{position:absolute;transform-origin:0 0}
#ui{position:fixed;bottom:14px;right:14px;display:flex;gap:14px;z-index:10}
#ui button{width:36px;height:36px;border:none;background:transparent;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;transition:transform .15s}
#ui button:hover{transform:scale(1.15)}
#ui button svg{display:block;shape-rendering:crispEdges;overflow:visible}
/* Dawn icon: warm pulse glow (drop-shadow on the SVG itself) */
#btnDawn svg{animation:dawnGlow 3s ease-in-out infinite}
@keyframes dawnGlow{
  0%,100%{filter:drop-shadow(0 0 1px rgba(255,180,100,.4))}
  50%{filter:drop-shadow(0 0 5px rgba(255,180,100,.9)) drop-shadow(0 0 10px rgba(255,140,80,.5))}
}
/* Hint icon: NOT clickable - it's a demo animation showing what clicking does */
#btnHint{width:36px;height:36px;display:flex;align-items:center;justify-content:center;pointer-events:none}
#btnHint svg{display:block;shape-rendering:crispEdges;overflow:visible}
/* House continuously cycles: dim → lit → dim */
#btnHint rect.hbody{animation:hintBodyLit 2.6s ease-in-out infinite}
#btnHint rect.hbody2{animation:hintBody2Lit 2.6s ease-in-out infinite}
#btnHint rect.hroof{animation:hintRoofLit 2.6s ease-in-out infinite}
#btnHint rect.hdoor{animation:hintDoorLit 2.6s ease-in-out infinite}
@keyframes hintBodyLit{
  0%,30%{fill:#5a5448}     /* dim (not black, just dark) */
  55%,75%{fill:#fff4d8}    /* lit */
  100%{fill:#5a5448}
}
@keyframes hintBody2Lit{
  0%,30%{fill:#3a3528}
  55%,75%{fill:#e8d4a8}
  100%{fill:#3a3528}
}
@keyframes hintRoofLit{
  0%,30%{fill:#4a2a20}
  55%,75%{fill:#d88060}
  100%{fill:#4a2a20}
}
@keyframes hintDoorLit{
  0%,30%{fill:#2a1810}
  55%,75%{fill:#a07050}
  100%{fill:#2a1810}
}
#mapSel{position:fixed;top:14px;right:14px;z-index:10}
#mapSel button{width:38px;height:38px;border:none;border-radius:9px;background:#1a1f2acc;color:#aab;font-size:18px;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;font-family:sans-serif}
#mapSel button:hover{background:#252b3acc;color:#fff;transform:scale(1.08)}
#stageLabel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#667;font-size:14px;letter-spacing:8px;text-transform:uppercase;font-family:sans-serif;pointer-events:none;text-align:center}
#stageLabel small{display:block;margin-top:8px;font-size:10px;letter-spacing:3px;color:#445}
</style></head><body>
<div id="splash">
<div class="stars" id="stars"></div>
<h1>CITY SYMPHONY</h1>
<h2>A Pixel Soundscape</h2>
<div class="play-wrap" onclick="showChoices()">
<div class="play-btn">♪</div>
</div>
<div class="map-stage">
<div class="map3d" id="lego_city" onclick="chooseMap('city')"></div>
<div class="map3d" id="lego_countryside" onclick="chooseMap('countryside')"></div>
<div class="map3d" id="lego_future" onclick="chooseMap('future')"></div>
</div>
</div>
<div id="sc"><canvas id="cv"></canvas></div>
<div id="mapSel">
<button onclick="returnToSplash()" title="Change map">↺</button>
</div>
<div id="stageLabel" style="display:none"></div>
<div id="ui">
<button onclick="doDayNight()" id="btnDawn" title="Reset to day"><svg viewBox="0 0 16 16" width="32" height="32">
<!-- Sun rays (8 directions) -->
<rect x="7" y="0" width="2" height="2" fill="#ffd870"/>
<rect x="7" y="14" width="2" height="2" fill="#ffd870"/>
<rect x="0" y="7" width="2" height="2" fill="#ffd870"/>
<rect x="14" y="7" width="2" height="2" fill="#ffd870"/>
<rect x="2" y="2" width="1" height="1" fill="#ffd870"/>
<rect x="13" y="2" width="1" height="1" fill="#ffd870"/>
<rect x="2" y="13" width="1" height="1" fill="#ffd870"/>
<rect x="13" y="13" width="1" height="1" fill="#ffd870"/>
<!-- Sun body (pixel circle) - outer ring darker -->
<rect x="6" y="3" width="4" height="1" fill="#ff9040"/>
<rect x="4" y="4" width="2" height="2" fill="#ff9040"/>
<rect x="10" y="4" width="2" height="2" fill="#ff9040"/>
<rect x="3" y="6" width="1" height="4" fill="#ff9040"/>
<rect x="12" y="6" width="1" height="4" fill="#ff9040"/>
<rect x="4" y="10" width="2" height="2" fill="#ff9040"/>
<rect x="10" y="10" width="2" height="2" fill="#ff9040"/>
<rect x="6" y="12" width="4" height="1" fill="#ff9040"/>
<!-- Sun body - inner fill (brighter) -->
<rect x="6" y="4" width="4" height="1" fill="#ffb050"/>
<rect x="5" y="5" width="6" height="1" fill="#ffc060"/>
<rect x="4" y="6" width="8" height="1" fill="#ffd070"/>
<rect x="4" y="7" width="8" height="2" fill="#ffd870"/>
<rect x="4" y="9" width="8" height="1" fill="#ffd070"/>
<rect x="5" y="10" width="6" height="1" fill="#ffc060"/>
<rect x="6" y="11" width="4" height="1" fill="#ffb050"/>
<!-- Highlight (top-left, makes it look 3d) -->
<rect x="6" y="5" width="2" height="1" fill="#fff0b0"/>
<rect x="5" y="6" width="2" height="1" fill="#fff0b0"/>
</svg></button>
<div id="btnHint" title="Click any building to light it up"><svg viewBox="0 0 16 16" width="32" height="32">
<!-- Roof: wide pyramid, shorter -->
<rect class="hroof" x="7" y="3" width="2" height="1" fill="#8a5040"/>
<rect class="hroof" x="5" y="4" width="6" height="1" fill="#a05a48"/>
<rect class="hroof" x="3" y="5" width="10" height="1" fill="#a05a48"/>
<rect class="hroof" x="2" y="6" width="12" height="1" fill="#8a5040"/>
<!-- House body: wider than tall -->
<rect class="hbody" x="3" y="7" width="10" height="6" fill="#e8dcc0"/>
<!-- Body shadow on right side for 3D feel -->
<rect class="hbody2" x="11" y="7" width="2" height="6" fill="#c8b898"/>

<rect class="hdoor" x="7" y="9" width="2" height="4" fill="#6a4030"/>

<rect x="8" y="11" width="1" height="1" fill="#ffd870"/>

<rect x="1" y="13" width="14" height="1" fill="#4a5868"/>
</svg></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== MAP REGISTRY =====
// Each map gets data + drawers in MAPS[id]. For Step 1, only 'city' is implemented;
// 'countryside' and 'future' are placeholders that show a "coming soon" label.
// Start as null - splash screen is showing, no map active yet, no ambient should play
var currentMap=null;
var MAPS={
  city:{name:'City',bg:'#2a3040'},
  countryside:{name:'Countryside',bg:'#2a3040'},
  future:{name:'Future City',bg:'#0a0418'}
};
function switchMap(id){
  if(id===currentMap)return;
  currentMap=id;
  // turn off any lit buildings & stop their notes
  if(typeof bldgState!=='undefined'){
    for(var i=0;i<bldgState.length;i++){
      bldgState[i]=0;
      if(bldgTimers[i]){clearTimeout(bldgTimers[i]);bldgTimers[i]=null;}
    }
  }
  if(typeof cyBldgState!=='undefined'){
    for(var i=0;i<cyBldgState.length;i++){
      cyBldgState[i]=0;
      if(cyBldgTimers[i]){clearTimeout(cyBldgTimers[i]);cyBldgTimers[i]=null;}
    }
  }
  // show/hide stage label
  var lbl=document.getElementById('stageLabel');
  var hint=document.getElementById('hint');
  lbl.style.display='none';
  document.body.style.background=MAPS[id].bg;
}

function returnToSplash(){
  if(isDiving)return;
  var splash=document.getElementById('splash');
  splash.style.display='flex';
  splash.classList.add('choosing');
  splash.style.opacity='0';
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){splash.style.opacity='1';});
  });
  buildLego('city');
  buildLego('countryside');
  buildLego('future');
  // Re-apply arm-on-leave to countryside only (since cursor is likely on ↺ button,
  // but might also be near center). Safer to gate countryside again.
  var cs=document.getElementById('lego_countryside');
  if(cs){
    cs.classList.add('no-arm');
    var onLeave=function(){cs.classList.remove('no-arm');cs.removeEventListener('mouseleave',onLeave);};
    cs.addEventListener('mouseleave',onLeave);
  }
  document.getElementById('stageLabel').style.display='none';
  if(typeof bldgState!=='undefined'){
    for(var i=0;i<bldgState.length;i++){
      bldgState[i]=0;
      if(bldgTimers[i]){clearTimeout(bldgTimers[i]);bldgTimers[i]=null;}
    }
  }
  if(typeof cyBldgState!=='undefined'){
    for(var i=0;i<cyBldgState.length;i++){
      cyBldgState[i]=0;
      if(cyBldgTimers[i]){clearTimeout(cyBldgTimers[i]);cyBldgTimers[i]=null;}
    }
  }
  if(typeof fcBldgState!=='undefined'){
    for(var i=0;i<fcBldgState.length;i++){
      fcBldgState[i]=0;
      if(fcBldgTimers[i]){clearTimeout(fcBldgTimers[i]);fcBldgTimers[i]=null;}
    }
  }
  // Clear currentMap so all ambient zones mute (the routing checks currentMap)
  currentMap=null;
  if(typeof updateAmbient==='function')updateAmbient();
}

var sc=document.getElementById('sc'),cv=document.getElementById('cv'),C=cv.getContext('2d');
var TW=16,TH=8,MW=80,MH=80;
var fullW=(MW+MH)*TW/2+200,fullH=(MW+MH)*TH/2+300;
cv.width=fullW;cv.height=fullH;
var ox=MH*TW/2+100,oy=80;
function ix(gx,gy){return ox+(gx-gy)*TW/2;}
function iy(gx,gy){return oy+(gx+gy)*TH/2;}
function quad(p1,p2,p3,p4,col){C.fillStyle=col;C.beginPath();C.moveTo(p1[0],p1[1]);C.lineTo(p2[0],p2[1]);C.lineTo(p3[0],p3[1]);C.lineTo(p4[0],p4[1]);C.closePath();C.fill();C.strokeStyle='#00000030';C.lineWidth=.5;C.stroke();}
function tile(gx,gy,col){var x=ix(gx,gy),y=iy(gx,gy);C.fillStyle=col;C.beginPath();C.moveTo(x,y-0.5);C.lineTo(x+TW/2+0.5,y+TH/2);C.lineTo(x,y+TH+0.5);C.lineTo(x-TW/2-0.5,y+TH/2);C.closePath();C.fill();}
function box(gx,gy,w,d,h,cR,cL,cT){var tr=[ix(gx+w,gy),iy(gx+w,gy)],br=[ix(gx+w,gy+d),iy(gx+w,gy+d)],bl=[ix(gx,gy+d),iy(gx,gy+d)],tl=[ix(gx,gy),iy(gx,gy)];quad([tr[0],tr[1]-h],[br[0],br[1]-h],br,tr,cR);quad([br[0],br[1]-h],[bl[0],bl[1]-h],bl,br,cL);quad([tl[0],tl[1]-h],[tr[0],tr[1]-h],[br[0],br[1]-h],[bl[0],bl[1]-h],cT);}
function bldgWins(gx,gy,w,d,h,fl,wc,fc){var tr=[ix(gx+w,gy),iy(gx+w,gy)],br=[ix(gx+w,gy+d),iy(gx+w,gy+d)],bl=[ix(gx,gy+d),iy(gx,gy+d)];var fH=h/fl;for(var f=0;f<fl;f++){var nc=Math.max(2,Math.floor(w*1.2));for(var c2=0;c2<nc;c2++){var t=(c2+.5)/nc,wh=fH*.4,wx,wy;wx=tr[0]+(br[0]-tr[0])*t;wy=tr[1]+(br[1]-tr[1])*t-f*fH-fH*.55;C.fillStyle=fc;C.fillRect(wx-3,wy-wh/2-1,6,wh+2);C.fillStyle=wc;C.fillRect(wx-2,wy-wh/2,4,wh);wx=bl[0]+(br[0]-bl[0])*t;wy=bl[1]+(br[1]-bl[1])*t-f*fH-fH*.55;C.fillStyle=fc;C.fillRect(wx-3,wy-wh/2-1,5,wh+2);C.fillStyle=wc;C.fillRect(wx-2,wy-wh/2,3.5,wh);}}}
function pkRoof(gx,gy,w,d,h,rH,rc){var tl=[ix(gx,gy),iy(gx,gy)-h],tr=[ix(gx+w,gy),iy(gx+w,gy)-h],bl=[ix(gx,gy+d),iy(gx,gy+d)-h],br=[ix(gx+w,gy+d),iy(gx+w,gy+d)-h];var rt=[(tl[0]+tr[0])/2,(tl[1]+tr[1])/2-rH],rb=[(bl[0]+br[0])/2,(bl[1]+br[1])/2-rH];quad(tl,rt,tr,tl,rc[0]);quad(tr,rt,rb,br,rc[1]);quad(bl,rb,br,bl,rc[2]);quad(tl,rt,rb,bl,rc[2]);quad(tr,[tr[0],tr[1]+3],[br[0],br[1]+3],br,rc[2]);}
function ftRoof(gx,gy,w,d,h,rc){var tl=[ix(gx,gy),iy(gx,gy)],tr=[ix(gx+w,gy),iy(gx+w,gy)],bl=[ix(gx,gy+d),iy(gx,gy+d)],br=[ix(gx+w,gy+d),iy(gx+w,gy+d)];quad([tl[0],tl[1]-h],[tr[0],tr[1]-h],[br[0],br[1]-h],[bl[0],bl[1]-h],rc[0]);quad([tr[0],tr[1]-h-3],[br[0],br[1]-h-3],[br[0],br[1]-h],[tr[0],tr[1]-h],rc[1]);quad([br[0],br[1]-h-3],[bl[0],bl[1]-h-3],[bl[0],bl[1]-h],[br[0],br[1]-h],rc[2]);}
var PU={wR:'#e8e6e0',wL:'#d4d0c8',gR:'#d0ccc4',gL:'#c0bab2',wi:'#2a3a5a',wf:'#b8b4aa',rc:['#3a4a68','#2a3a58','#1e2e48']};
var PL=[
  {wR:'#c8a8d0',wL:'#b898c0',gR:'#b090b8',gL:'#a080a8',wi:'#a060c8',wf:'#a890b0',rc:['#6830a0','#582888','#482070']},
  {wR:'#d0a8d0',wL:'#c098c0',gR:'#b890b8',gL:'#a880a8',wi:'#b068c0',wf:'#b098b0',rc:['#783898','#683080','#582868']},
  {wR:'#d8a8c8',wL:'#c898b8',gR:'#c090b0',gL:'#b080a0',wi:'#c060b0',wf:'#b898a8',rc:['#903878','#803068','#702858']},
  {wR:'#e0a8c0',wL:'#d098b0',gR:'#c890a8',gL:'#b88098',wi:'#e05898',wf:'#c098a0',rc:['#b03070','#982860','#882050']},
  {wR:'#e8b0b8',wL:'#d8a0a8',gR:'#d098a0',gL:'#c08890',wi:'#e86088',wf:'#c8a098',rc:['#c03860','#a83050','#902840']},
  {wR:'#f0b8b0',wL:'#e0a8a0',gR:'#d8a098',gL:'#c89088',wi:'#f06878',wf:'#d0a090',rc:['#d04050','#b83840','#a03038']},
  {wR:'#f0c0a8',wL:'#e0b098',gR:'#d8a890',gL:'#c89880',wi:'#f08060',wf:'#d0a888',rc:['#d05038','#b84830','#a03828']},
  {wR:'#f0c8a8',wL:'#e0b898',gR:'#d8b090',gL:'#c8a080',wi:'#f09058',wf:'#d0a888',rc:['#d06038','#b85030','#a04028']},
  {wR:'#f4d0a8',wL:'#e4c098',gR:'#dcb890',gL:'#ccA880',wi:'#f4a850',wf:'#d4b088',rc:['#d87030','#c06028','#a85020']},
  {wR:'#f8d8a8',wL:'#e8c898',gR:'#e0c090',gL:'#d0b080',wi:'#f8b848',wf:'#d8b888',rc:['#e08028','#c87020','#b06018']},
  {wR:'#f8e0b0',wL:'#e8d0a0',gR:'#e0c898',gL:'#d0b888',wi:'#f8c840',wf:'#d8c090',rc:['#e09020','#c88018','#b07010']},
  {wR:'#f8e8b8',wL:'#e8d8a8',gR:'#e0d0a0',gL:'#d0c090',wi:'#f8d838',wf:'#d8c898',rc:['#e0a018','#c89010','#b08008']},
];
var CFGS=[{w:3,d:3,fl:4,h:70,r:'p',rH:12},{w:4,d:2.5,fl:3,h:50,r:'f'},{w:2,d:2.5,fl:6,h:100,r:'f'},{w:3.5,d:2.5,fl:2,h:35,r:'f'},{w:2.5,d:2.5,fl:8,h:140,r:'f'},{w:5,d:3,fl:4,h:60,r:'f'},{w:3,d:3,fl:2,h:35,r:'p',rH:10},{w:2.5,d:2.5,fl:1,h:22,r:'p',rH:12},{w:4,d:3,fl:2,h:40,r:'f'},{w:3,d:3,fl:4,h:70,r:'p',rH:14}];
function drawBuilding(gx,gy,type,lit){
  var c=CFGS[type%CFGS.length],p=lit?PL[(lit-1)%PL.length]:PU;
  box(gx,gy,c.w,c.d,4,'#b0aaa0','#a09a90','#c0b8a8');var fH=c.h/c.fl;
  box(gx,gy,c.w,c.d,fH,p.gR,p.gL,p.wR);
  if(c.fl>1){var tr=[ix(gx+c.w,gy),iy(gx+c.w,gy)],br=[ix(gx+c.w,gy+c.d),iy(gx+c.w,gy+c.d)],bl=[ix(gx,gy+c.d),iy(gx,gy+c.d)];quad([tr[0],tr[1]-c.h],[br[0],br[1]-c.h],[br[0],br[1]-fH],[tr[0],tr[1]-fH],p.wR);quad([br[0],br[1]-c.h],[bl[0],bl[1]-c.h],[bl[0],bl[1]-fH],[br[0],br[1]-fH],p.wL);}
  bldgWins(gx,gy,c.w,c.d,c.h,c.fl,p.wi,p.wf);
  C.strokeStyle='#c0bcb440';C.lineWidth=.3;var tr2=[ix(gx+c.w,gy),iy(gx+c.w,gy)],br2=[ix(gx+c.w,gy+c.d),iy(gx+c.w,gy+c.d)],bl2=[ix(gx,gy+c.d),iy(gx,gy+c.d)];
  for(var f=1;f<=c.fl;f++){C.beginPath();C.moveTo(tr2[0],tr2[1]-f*fH);C.lineTo(br2[0],br2[1]-f*fH);C.stroke();C.beginPath();C.moveTo(br2[0],br2[1]-f*fH);C.lineTo(bl2[0],bl2[1]-f*fH);C.stroke();}
  if(c.r==='p')pkRoof(gx,gy,c.w,c.d,c.h,c.rH,p.rc);else ftRoof(gx,gy,c.w,c.d,c.h,p.rc);

}

function drawPerson(gx,gy,shirt,pants,skin,walkPhase){

    C.fillRect(x-3,y-7.8,.9,3);

  C.fillStyle=skin;

    C.fillRect(x-3,y-4.8,.9,1);

  C.fillRect(x-.7,y-9.6,1.4,.9);

  C.fillRect(x-1.75,y-12.6,3.5,3.5);

  C.fillStyle='#1a1410';
  C.fillRect(x-1.05,y-10.6,.6,.7);
  C.fillRect(x+.45,y-10.6,.6,.7);

// ===== ROAD NETWORK (for car AI) =====
// Vertical road lanes (each road has 2 lanes at gx and gx+1)
// Cars on x=9 go SOUTH (+y), x=10 go NORTH (-y) - right-side driving
// For each pair: [9,10],[21,22],[33,34],[45,46],[57,58],[69,70]
// Horizontal: y=9 EAST (+x), y=10 WEST (-x); same for 33/34, 57/58, 69/70
// River at y=20-25, only bridges at x=21,22 / x=45,46 / x=69,70 allow crossing

// Road segment centers - cars travel on lanes ~ 0.5 offset to be in middle of tile
var V_ROADS_S=[9,21,33,45,57,69]; // southbound (+y)
var V_ROADS_N=[10,22,34,46,58,70]; // northbound (-y)
var H_ROADS_E=[9,33,57,69]; // eastbound (+x)
var H_ROADS_W=[10,34,58,70]; // westbound (-x)

// Intersection points (vertical road x, horizontal road y)
// At intersections cars can turn
var ALL_V=[9,10,21,22,33,34,45,46,57,58,69,70];
var ALL_H=[9,10,33,34,57,58,69,70];

// A road point: {x,y,dir} where dir 0=E,1=S,2=W,3=N
// Each "car" knows its current position (float) and direction
// At intersections (within tolerance), randomly continue or turn

function canPassRiver(gx){
  // Bridges are at x=21 and 22, 45 and 46, 69 and 70
  return gx===21||gx===22||gx===45||gx===46||gx===69||gx===70;
}

// CARS - state: gx, gy, dir, color, speed
var cars=[];
function spawnCar(){
  var col=['#c83838','#d04848','#a82828','#e8b838','#f0c848','#d8a020','#3868a8','#5878b8','#2858a0'][Math.floor(Math.random()*9)];
  // Pick a random road position
  if(Math.random()<.5){
    // Vertical road
    var goSouth=Math.random()<.5;
    var x=goSouth?V_ROADS_S[Math.floor(Math.random()*V_ROADS_S.length)]:V_ROADS_N[Math.floor(Math.random()*V_ROADS_N.length)];
    var y=Math.random()*MH;
    // Skip if in river area and not on bridge
    if(y>=20&&y<=25&&!canPassRiver(x))y=goSouth?Math.random()*19:25+Math.random()*(MH-25);
    cars.push({gx:x+.5,gy:y+.5,dir:goSouth?1:3,col:col,speed:.8+Math.random()*.4,turnCooldown:0});
  }else{
    var goEast=Math.random()<.5;
    var y=goEast?H_ROADS_E[Math.floor(Math.random()*H_ROADS_E.length)]:H_ROADS_W[Math.floor(Math.random()*H_ROADS_W.length)];
    var x=Math.random()*MW;
    cars.push({gx:x+.5,gy:y+.5,dir:goEast?0:2,col:col,speed:.8+Math.random()*.4,turnCooldown:0});
  }
}
for(var ci=0;ci<22;ci++)spawnCar();

function updateCar(car,dt){
  if(car.turnCooldown>0)car.turnCooldown-=dt;
  // Check for car in front: if so, brake to a stop
  var blocked=pathBlocked(car,true,1.4,.55);
  var spd=car.speed;
  if(blocked){
    spd=0;
    car.stuckTime=(car.stuckTime||0)+dt;
    // Deadlock-break: if stopped for >3 seconds, try to turn
    if(car.stuckTime>3 && car.turnCooldown<=0){
      // Try to find a perpendicular direction that's a valid road through this point
      var ix_=Math.floor(car.gx),iy_=Math.floor(car.gy);
      var alts=[];
      if(V_ROADS_S.indexOf(ix_)>=0 && car.dir!==1)alts.push(1);
      if(V_ROADS_N.indexOf(ix_)>=0 && car.dir!==3)alts.push(3);
      if(H_ROADS_E.indexOf(iy_)>=0 && car.dir!==0)alts.push(0);
      if(H_ROADS_W.indexOf(iy_)>=0 && car.dir!==2)alts.push(2);
      // exclude opposite (no u-turn unless desperate)
      var opp=(car.dir+2)%4;
      var nonU=alts.filter(function(o){return o!==opp;});
      var newDir=nonU.length>0?nonU[Math.floor(Math.random()*nonU.length)]:(alts.length>0?alts[Math.floor(Math.random()*alts.length)]:car.dir);
      if(newDir!==car.dir){
        car.dir=newDir;
        // Snap to lane
        if(newDir===0||newDir===2){
          var lanes=newDir===0?H_ROADS_E:H_ROADS_W;
          var lane=lanes.reduce(function(a,b){return Math.abs(b-car.gy+.5)<Math.abs(a-car.gy+.5)?b:a;},lanes[0]);
          car.gy=lane+.5;
        }else{
          var lanes=newDir===1?V_ROADS_S:V_ROADS_N;
          var lane=lanes.reduce(function(a,b){return Math.abs(b-car.gx+.5)<Math.abs(a-car.gx+.5)?b:a;},lanes[0]);
          car.gx=lane+.5;
        }
        car.turnCooldown=2;
        car.stuckTime=0;
      }
    }
  }else{
    car.stuckTime=0;
  }
  // Move along direction
  if(car.dir===0)car.gx+=spd*dt;
  else if(car.dir===1)car.gy+=spd*dt;
  else if(car.dir===2)car.gx-=spd*dt;
  else if(car.dir===3)car.gy-=spd*dt;
  
  // Wrap around map edges
  if(car.gx<-2)car.gx=MW+1;
  if(car.gx>MW+2)car.gx=-1;
  if(car.gy<-2)car.gy=MH+1;
  if(car.gy>MH+2)car.gy=-1;
  
  // Check for intersection - we're near an intersection if our perpendicular coord
  // is close to a road tile center (lane.5)
  if(car.turnCooldown<=0){
    var curLane=Math.floor(car.gx)===Math.round(car.gx-.5)+0;
    var nearIntersection=false;
    var ix_=Math.floor(car.gx),iy_=Math.floor(car.gy);
    var fx=car.gx-ix_, fy=car.gy-iy_;
    // Near intersection center if both ix_ and iy_ are road tiles and frac near .5
    if(car.dir===0||car.dir===2){
      // moving horizontally, check if at intersection with vertical road
      if(ALL_V.indexOf(ix_)>=0 && fx>.4 && fx<.6 && ALL_H.indexOf(iy_)>=0){
        nearIntersection=true;
      }
    }else{
      if(ALL_H.indexOf(iy_)>=0 && fy>.4 && fy<.6 && ALL_V.indexOf(ix_)>=0){
        nearIntersection=true;
      }
    }
    
    if(nearIntersection && Math.random()<.012){
      // Try to turn. Determine valid turn directions (right turn or left turn, no U-turn)
      // For one-way lanes, only certain turns work
      var newDir=-1;
      var options=[];
      // We're at intersection of vertical road ix_ and horizontal road iy_
      // From ix_, possible directions: if V_ROADS_S includes ix_ -> can go south (dir 1)
      //                                if V_ROADS_N includes ix_ -> can go north (dir 3)
      // From iy_: if H_ROADS_E includes iy_ -> can go east (dir 0)
      //          if H_ROADS_W includes iy_ -> can go west (dir 2)
      if(V_ROADS_S.indexOf(ix_)>=0)options.push(1);
      if(V_ROADS_N.indexOf(ix_)>=0)options.push(3);
      if(H_ROADS_E.indexOf(iy_)>=0)options.push(0);
      if(H_ROADS_W.indexOf(iy_)>=0)options.push(2);
      // Remove current direction's opposite (no U-turn)
      var opposite=(car.dir+2)%4;
      options=options.filter(function(o){return o!==opposite;});
      if(options.length>0){
        newDir=options[Math.floor(Math.random()*options.length)];
        if(newDir!==car.dir){
          car.dir=newDir;
          // Snap to lane center for cleanliness
          if(newDir===0||newDir===2){
            car.gy=iy_+.5;
            // also snap to correct lane
            if(newDir===0){
              // eastbound, must be on H_ROADS_E
              var lane=H_ROADS_E.reduce(function(a,b){return Math.abs(b-car.gy+.5)<Math.abs(a-car.gy+.5)?b:a;},H_ROADS_E[0]);
              car.gy=lane+.5;
            }else{
              var lane=H_ROADS_W.reduce(function(a,b){return Math.abs(b-car.gy+.5)<Math.abs(a-car.gy+.5)?b:a;},H_ROADS_W[0]);
              car.gy=lane+.5;
            }
          }else{
            car.gx=ix_+.5;
            if(newDir===1){
              var lane=V_ROADS_S.reduce(function(a,b){return Math.abs(b-car.gx+.5)<Math.abs(a-car.gx+.5)?b:a;},V_ROADS_S[0]);
              car.gx=lane+.5;
            }else{
              var lane=V_ROADS_N.reduce(function(a,b){return Math.abs(b-car.gx+.5)<Math.abs(a-car.gx+.5)?b:a;},V_ROADS_N[0]);
              car.gx=lane+.5;
            }
          }
          car.turnCooldown=2;
        }
      }
    }
  }
  
  // If approaching river without bridge, force a turn at the road before it
  if(car.dir===1 && car.gy>17 && car.gy<19.8 && !canPassRiver(Math.floor(car.gx))){
    // Force turn at nearest intersection at y=9 or y=33... but simpler: just turn around
    // Actually let's force them to turn at nearest H road before river
    // The previous H road south of where we are now is at y... no, we already passed.
    // Better: at y=18.5, force a turn east or west
    if(car.gy>18 && car.gy<19){
      // Try to turn onto H road - but H roads are at y=9,10,33,34,57,58,69,70 - none at 18
      // So actually we need to teleport. Better: when spawning, don't put them on dead-ends.
      // Quick fix: just wrap to other side of river
      car.gy=26;
    }
  }
  if(car.dir===3 && car.gy<26.2 && car.gy>25 && !canPassRiver(Math.floor(car.gx))){
    if(car.gy>25 && car.gy<26){
      car.gy=19;
    }
  }
}

// Build a spatial hash each frame, check if anything blocks ahead
var spatialGrid={};
var GRID_CELL=2;
function gridKey(gx,gy){return Math.floor(gx/GRID_CELL)+','+Math.floor(gy/GRID_CELL);}
function rebuildSpatialGrid(){
  spatialGrid={};
  function add(unit){
    // Add to current cell and neighbors (so 2x2 cell queries work)
    var cx=Math.floor(unit.gx/GRID_CELL),cy=Math.floor(unit.gy/GRID_CELL);
    for(var dx=-1;dx<=1;dx++)for(var dy=-1;dy<=1;dy++){
      var k=(cx+dx)+','+(cy+dy);
      if(!spatialGrid[k])spatialGrid[k]=[];
      if(dx===0&&dy===0)spatialGrid[k].push(unit);
    }
  }
  cars.forEach(add);people.forEach(add);footballPlayers.forEach(add);
}
function neighbors(gx,gy){
  var cx=Math.floor(gx/GRID_CELL),cy=Math.floor(gy/GRID_CELL);
  var out=[];
  for(var dx=-1;dx<=1;dx++)for(var dy=-1;dy<=1;dy++){
    var k=(cx+dx)+','+(cy+dy);
    if(spatialGrid[k])for(var i=0;i<spatialGrid[k].length;i++)out.push(spatialGrid[k][i]);
  }
  return out;
}
// Check if there's a blocker in the direction of travel
// isCar: caller is a car. lookAhead: how far to check. radius: lateral tolerance.
function pathBlocked(unit,isCar,lookAhead,radius){
  var dx=0,dy=0;
  if(unit.dir===0)dx=1;else if(unit.dir===1)dy=1;else if(unit.dir===2)dx=-1;else dy=-1;
  var ns=neighbors(unit.gx,unit.gy);
  for(var i=0;i<ns.length;i++){
    var o=ns[i];
    if(o===unit)continue;
    var oIsCar=!o.shirt;
    // Cars only check other cars (people don't block cars - they're on sidewalks anyway)
    // People check both cars and other people
    if(isCar && !oIsCar)continue;
    var rx=o.gx-unit.gx, ry=o.gy-unit.gy;
    var forward=rx*dx+ry*dy;
    if(forward<.05||forward>lookAhead)continue;
    var lateral=Math.abs(rx*dy-ry*dx);
    if(lateral<radius)return true;
  }
  return false;
}

function updatePerson(p,dt){
  p.phase=(p.phase+p.speed*dt*3)%1;
  if(p.type==='pedestrian'){
    // Check for blocker ahead (other people or cars)
    var blocked=pathBlocked(p,false,.7,.35);
    var spd=blocked?0:p.speed;
    if(blocked){
      p.stuckTime=(p.stuckTime||0)+dt;
      // Deadlock-break: if stopped >1.5s, reverse direction
      if(p.stuckTime>1.5){
        p.dir=(p.dir+2)%4;
        p.stuckTime=0;
      }
    }else p.stuckTime=0;
    // Walk along sidewalk
    if(p.dir===0)p.gx+=spd*dt;
    else if(p.dir===1)p.gy+=spd*dt;
    else if(p.dir===2)p.gx-=spd*dt;
    else if(p.dir===3)p.gy-=spd*dt;
    // Avoid river
    if(p.gy>=19.5&&p.gy<=25.5){
      if(p.dir===1)p.gy=26;
      else if(p.dir===3)p.gy=19;
    }
    // Wrap
    if(p.gx<-1)p.gx=MW+1;
    if(p.gx>MW+1)p.gx=-1;
    if(p.gy<-1)p.gy=MH+1;
    if(p.gy>MH+1)p.gy=-1;
    // Occasionally turn at intersections
    if(Math.random()<.003){
      var horizontal=p.dir===0||p.dir===2;
      if(horizontal && SIDE_V.indexOf(Math.floor(p.gx))>=0){
        p.dir=Math.random()<.5?1:3;
        var lane=SIDE_V.reduce(function(a,b){return Math.abs(b-p.gx+.5)<Math.abs(a-p.gx+.5)?b:a;},SIDE_V[0]);
        p.gx=lane+.5;
      }else if(!horizontal && SIDE_H.indexOf(Math.floor(p.gy))>=0){
        p.dir=Math.random()<.5?0:2;
        var lane=SIDE_H.reduce(function(a,b){return Math.abs(b-p.gy+.5)<Math.abs(a-p.gy+.5)?b:a;},SIDE_H[0]);
        p.gy=lane+.5;
      }
    }
  }else if(p.type==='wanderer'||p.type==='footballer'){
    p.dirChange-=dt;
    if(p.dirChange<=0){
      // Bias toward center
      var dx=p.cx-p.gx, dy=p.cy-p.gy;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>p.radius){
        if(Math.abs(dx)>Math.abs(dy))p.dir=dx>0?0:2;
        else p.dir=dy>0?1:3;
      }else{
        p.dir=Math.floor(Math.random()*4);
      }
      p.dirChange=.5+Math.random()*2;
    }
    // Avoidance: don't crash into other people. Footballers chase ball so smaller radius.
    var lookA=p.type==='footballer'?.4:.5;
    var radA=p.type==='footballer'?.25:.3;
    var blocked=pathBlocked(p,false,lookA,radA);
    var spd=blocked?0:p.speed;
    // If blocked while wandering, more likely to just turn next tick
    if(blocked && Math.random()<.08)p.dirChange=0;
    if(p.dir===0)p.gx+=spd*dt;
    else if(p.dir===1)p.gy+=spd*dt;
    else if(p.dir===2)p.gx-=spd*dt;
    else if(p.dir===3)p.gy-=spd*dt;
  }
}

function updateFootball(dt){
  // Ball physics
  ball.gx+=ball.vx*dt;
  ball.gy+=ball.vy*dt;
  ball.vx*=Math.pow(.4,dt);
  ball.vy*=Math.pow(.4,dt);
  // Keep ball in bounds
  if(ball.gx<37){ball.gx=37;ball.vx=Math.abs(ball.vx)*.5;}
  if(ball.gx>43){ball.gx=43;ball.vx=-Math.abs(ball.vx)*.5;}
  if(ball.gy<61){ball.gy=61;ball.vy=Math.abs(ball.vy)*.5;}
  if(ball.gy>65){ball.gy=65;ball.vy=-Math.abs(ball.vy)*.5;}
  // Players near ball kick it
  footballPlayers.forEach(function(p){
    var dx=ball.gx-p.gx, dy=ball.gy-p.gy;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<.6 && Math.random()<.05){
      var kx=(Math.random()-.5)*8, ky=(Math.random()-.5)*8;
      ball.vx=kx;ball.vy=ky;
    }
    // Move toward ball
    if(d<3 && d>.3){
      p.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?0:2):(dy>0?1:3);
    }
  });
}

// =====================================================================
// COUNTRYSIDE MAP
// Crescent-shaped landscape with a winding stream. ~25 buildings, fields,
// orchards, livestock, winding dirt paths. Landmark windmill at (40,40).
// =====================================================================

// Stream path - a winding curve from west to east. Each entry is a center point
// at integer grid x with the stream's center gy at that point. We render the
// stream as a 3-tile-wide band sampled along this curve.
var CY_STREAM_PTS=[];
(function(){
  for(var gx=0;gx<80;gx++){
    // S-shaped curve: meanders around y=50, dips lower in middle (away from windmill at 33)
    var gy=50 + Math.sin(gx*0.13)*4 - Math.sin((gx-40)*0.08)*4 + Math.sin(gx*0.27)*1.5;
    CY_STREAM_PTS.push({gx:gx,gy:gy});
  }
})();

// Returns true if (gx,gy) is inside the stream (within ~1.6 tiles of center curve)
function cyIsStream(gx,gy){
  if(gx<0||gx>=80)return false;
  var pt=CY_STREAM_PTS[Math.floor(gx)];
  if(!pt)return false;
  return Math.abs(gy-pt.gy)<1.6;
}
function cyStreamCenterY(gx){
  var i=Math.max(0,Math.min(79,Math.floor(gx)));
  return CY_STREAM_PTS[i].gy;
}

// inBounds: defines the crescent map shape. Land extends within a bounded
// distance from the stream, with the distance varying along x to create
// organic, non-rectangular borders.
function cyInBounds(gx,gy){
  if(gx<2||gx>=78)return false;
  var sy=cyStreamCenterY(gx);
  var t=(gx-2)/76;
  // bell curve for "wider in middle" + sin wave for organic edges
  var northExtent=22+10*Math.sin(t*Math.PI)+3*Math.sin(gx*0.21);
  var southExtent=15+9*Math.sin(t*Math.PI)+3*Math.cos(gx*0.17);
  if(gy<sy-northExtent)return false;
  if(gy>sy+southExtent)return false;
  if(gy<0||gy>=80)return false;
  return true;
}

// Terrain zones: defines what's where (field, grass, path, orchard, farmyard)
function cyTileType(gx,gy){
  if(!cyInBounds(gx,gy))return null;
  if(cyIsStream(gx,gy))return 'stream';
  // Bridges - cross the stream at three points
  if((Math.floor(gx)===22||Math.floor(gx)===40||Math.floor(gx)===58) && cyIsStream(gx,gy))return 'bridge';
  // Big wheat field - NW (western half only now)
  if(gx>=4&&gx<12&&gy>=30&&gy<44 && !cyIsStream(gx,gy))return 'wheat';
  // Pasture - eastern half of where NW wheat was
  if(gx>=12&&gx<22&&gy>=30&&gy<44 && !cyIsStream(gx,gy))return 'pasture';
  // Big wheat field - SE (south of stream)
  if(gx>=48&&gx<68&&gy>=60&&gy<72 && !cyIsStream(gx,gy))return 'wheat';
  // Orchard - NE (north of stream)
  if(gx>=54&&gx<72&&gy>=30&&gy<44 && !cyIsStream(gx,gy))return 'orchard';
  // Flower field - SW (was orchard, now flowers)
  if(gx>=10&&gx<24&&gy>=60&&gy<70 && !cyIsStream(gx,gy))return 'flowers';
  // Farmyard around center (the windmill landmark at 40, 33)
  if(gx>=34&&gx<48&&gy>=27&&gy<38)return 'farmyard';
  // Dirt path along stream banks
  var sy=cyStreamCenterY(gx);
  if(Math.abs(gy-(sy-2.5))<.8)return 'path';
  if(Math.abs(gy-(sy+2.5))<.8)return 'path';
  // Vertical paths
  if((Math.floor(gx)===28||Math.floor(gx)===52) && !cyIsStream(gx,gy))return 'path';
  return 'grass';
}

// Pre-sample stream curve as polyline for rendering
function cyRenderStream(){
  // For each strip of the stream, fill a quadrilateral
  for(var i=0;i<CY_STREAM_PTS.length-1;i++){
    var p1=CY_STREAM_PTS[i],p2=CY_STREAM_PTS[i+1];
    if(!cyInBounds(p1.gx,p1.gy)&&!cyInBounds(p2.gx,p2.gy))continue;
    var tl=[ix(p1.gx,p1.gy-1.6),iy(p1.gx,p1.gy-1.6)];
    var tr=[ix(p2.gx,p2.gy-1.6),iy(p2.gx,p2.gy-1.6)];
    var br=[ix(p2.gx,p2.gy+1.6),iy(p2.gx,p2.gy+1.6)];
    var bl=[ix(p1.gx,p1.gy+1.6),iy(p1.gx,p1.gy+1.6)];
    var shade=(i%5)<2?'#5890b0':(i%5)<4?'#4880a0':'#4078a0';
    C.fillStyle=shade;C.beginPath();
    C.moveTo(tl[0],tl[1]);C.lineTo(tr[0],tr[1]);C.lineTo(br[0],br[1]);C.lineTo(bl[0],bl[1]);
    C.closePath();C.fill();
  }
  // Stream highlights/ripples
  C.strokeStyle='#a8c8d8';C.lineWidth=.6;
  for(var i=0;i<CY_STREAM_PTS.length-1;i+=3){
    var p=CY_STREAM_PTS[i];
    if(!cyInBounds(p.gx,p.gy))continue;
    var px=ix(p.gx,p.gy+(Math.sin(i)*.5)),py=iy(p.gx,p.gy+(Math.sin(i)*.5));
    C.beginPath();C.moveTo(px-4,py);C.quadraticCurveTo(px,py-1.5,px+4,py);C.stroke();
  }
  // Stream banks (darker lip on each side)
  C.fillStyle='#7a6850';
  for(var i=0;i<CY_STREAM_PTS.length-1;i++){
    var p1=CY_STREAM_PTS[i],p2=CY_STREAM_PTS[i+1];
    if(!cyInBounds(p1.gx,p1.gy)&&!cyInBounds(p2.gx,p2.gy))continue;
    var tl=[ix(p1.gx,p1.gy-1.6),iy(p1.gx,p1.gy-1.6)];
    var tr=[ix(p2.gx,p2.gy-1.6),iy(p2.gx,p2.gy-1.6)];
    C.beginPath();C.moveTo(tl[0],tl[1]);C.lineTo(tr[0],tr[1]);C.lineTo(tr[0],tr[1]-2);C.lineTo(tl[0],tl[1]-2);
    C.closePath();C.fill();
  }
}

// === PEOPLE (countryside villagers) ===
// People wander on dirt paths + grass, avoiding stream/fields/orchards/pastures/
// fenced farmyard/buildings. Each has a target point and walks straight toward it.
function cyIsWalkable(gx,gy){
  if(!cyInBounds(gx,gy))return false;
  var tt=cyTileType(gx,gy);
  // explicitly forbidden zones
  if(tt==='stream'||tt==='wheat'||tt==='orchard'||tt==='flowers'||
     tt==='pasture'||tt==='farmyard'||tt==='bridge')return false;
  // ok to walk: path or grass
  if(tt!=='path'&&tt!=='grass')return false;
  // must be far enough from any building
  for(var i=0;i<cyBuildings.length;i++){
    var b=cyBuildings[i], bw=b[3], bd=b[4];
    if(gx>b[0]-0.8 && gx<b[0]+bw+0.8 && gy>b[1]-0.8 && gy<b[1]+bd+0.8)return false;
  }
  return true;
}

// Generate ~22 villagers, balanced between north and south of the stream
var cyPeople=[];
(function(){
  var seed=33;function r(){seed=(seed*16807)%2147483647;return(seed-1)/2147483646;}
  // side: 'N' = north of stream (gy < streamY), 'S' = south, null = anywhere
  function findWalkablePt(side){
    for(var k=0;k<100;k++){
      var gx=4+r()*72,gy=4+r()*72;
      if(!cyIsWalkable(gx,gy))continue;
      if(side){
        var sy=cyStreamCenterY(gx);
        if(side==='N' && gy>=sy-1)continue;
        if(side==='S' && gy<=sy+1)continue;
      }
      return {gx:gx,gy:gy};
    }
    return null;
  }
  var skinCols=['#f4d8b8','#e8c498','#d8a878','#b88858','#a87858'];
  var shirtCols=['#a83830','#3868a0','#487848','#a86838','#684880','#205860','#a87830'];
  var pantsCols=['#3a3018','#202830','#4a3818','#283040'];
  var TARGET=22;
  for(var i=0;i<TARGET;i++){
    // First half goes north of stream, second half goes south - keeps balance
    var side=i<TARGET/2?'N':'S';
    var pt=findWalkablePt(side);if(!pt)continue;
    var tgt=findWalkablePt(null);if(!tgt)continue;
    cyPeople.push({
      gx:pt.gx, gy:pt.gy,
      tx:tgt.gx, ty:tgt.gy,
      rest:0,
      phase:r(),
      speed:0.30+r()*0.20,
      face:1,
      skin:skinCols[Math.floor(r()*skinCols.length)],
      shirt:shirtCols[Math.floor(r()*shirtCols.length)],
      pants:pantsCols[Math.floor(r()*pantsCols.length)]
    });
  }
})();

function updateCyPerson(p,dt){
  if(p.rest>0){
    p.rest-=dt;
    return;
  }
  var dx=p.tx-p.gx, dy=p.ty-p.gy;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<0.3){
    // arrived - short rest, then pick new target
    p.rest=0.5+Math.random()*2;
    // find a new walkable target (try a few)
    for(var k=0;k<30;k++){
      var nx=4+Math.random()*72, ny=4+Math.random()*72;
      if(cyIsWalkable(nx,ny)){p.tx=nx;p.ty=ny;break;}
    }
    return;
  }
  p.phase=(p.phase+p.speed*dt*3)%1;
  var step=p.speed*dt;
  var nx=p.gx+(dx/dist)*step;
  var ny=p.gy+(dy/dist)*step;
  // if the next step would walk into a forbidden tile, pick a new target instead
  if(!cyIsWalkable(nx,ny)){
    for(var k=0;k<20;k++){
      var tx=4+Math.random()*72, ty=4+Math.random()*72;
      if(cyIsWalkable(tx,ty)){p.tx=tx;p.ty=ty;break;}
    }
    return;
  }
  p.gx=nx; p.gy=ny;
  if(Math.abs(dx)>Math.abs(dy))p.face=dx>0?1:-1;
}

// Villager sprite: reuses city's drawPerson (same proportions) and overlays
// a straw hat on farmers (~half of villagers based on shirt color).
function cyDrawPerson(p){
  drawPerson(p.gx, p.gy, p.shirt, p.pants, p.skin, p.phase);

function updateLivestock(l,dt){
  if(l.rest>0){
    l.rest-=dt;
    return;
  }
  var dx=l.tx-l.gx, dy=l.ty-l.gy;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<0.15){
    // arrived - rest 2-6s then pick a new target inside the pasture
    l.rest=2+Math.random()*4;
    l.tx=CY_PASTURE.x0+Math.random()*(CY_PASTURE.x1-CY_PASTURE.x0);
    l.ty=CY_PASTURE.y0+Math.random()*(CY_PASTURE.y1-CY_PASTURE.y0);
    return;
  }
  var spd=(l.type==='cow')?0.3:0.4; // sheep slightly faster than cow
  var step=Math.min(spd*dt,dist);
  l.gx+=(dx/dist)*step;
  l.gy+=(dy/dist)*step;
  // hard clamp to pasture bounds as safety
  if(l.gx<CY_PASTURE.x0)l.gx=CY_PASTURE.x0;
  if(l.gx>CY_PASTURE.x1)l.gx=CY_PASTURE.x1;
  if(l.gy<CY_PASTURE.y0)l.gy=CY_PASTURE.y0;
  if(l.gy>CY_PASTURE.y1)l.gy=CY_PASTURE.y1;
  // facing: 1 = moving right (+x or +y), -1 = left
  if(Math.abs(dx)>Math.abs(dy))l.face=dx>0?1:-1;
}

// COUNTRYSIDE DRAWERS
// Simple cottage: white walls + red triangle roof. Width/depth come from data.
function cyDrawCottage(gx,gy,w,d,lit){
  var h=w<3?7:8.5;
  var rH=w<3?5:6;
  var pal=lit>0?CY_COTTAGE_LIT[(lit-1)%CY_COTTAGE_LIT.length]:null;
  // Default (unlit): muted light brown roof - reads "quiet" so lit colors pop.
  var roofD,roofM,roofL;
  if(pal){
    roofD=roofM=roofL=pal.rf; // single color across all roof faces
  }else{
    // 3-shade light brown for subtle depth, but desaturated
    roofD='#7a6048';roofM='#a08068';roofL='#8e7058';
  }
  var wallR=pal?pal.wR:'#e8e0d0';
  var wallL=pal?pal.wL:'#d0c8b8';
  var wallT=pal?pal.wT:'#ece4d4';
  var winCol=pal?pal.win:'#88a8b8';
  // foundation stone band (stays neutral)
  box(gx,gy,w,d,1,'#7a6850','#685640','#8a7860');
  // walls
  box(gx,gy,w,d,h,wallR,wallL,wallT);
  // pitched roof
  var tl=[ix(gx,gy),iy(gx,gy)-h],tr=[ix(gx+w,gy),iy(gx+w,gy)-h];
  var bl2=[ix(gx,gy+d),iy(gx,gy+d)-h],br2=[ix(gx+w,gy+d),iy(gx+w,gy+d)-h];
  var ridge1=[(tl[0]+bl2[0])/2,(tl[1]+bl2[1])/2-rH];
  var ridge2=[(tr[0]+br2[0])/2,(tr[1]+br2[1])/2-rH];
  // back roof slope
  C.fillStyle=roofM;
  C.beginPath();C.moveTo(tl[0],tl[1]);C.lineTo(ridge1[0],ridge1[1]);C.lineTo(ridge2[0],ridge2[1]);C.lineTo(tr[0],tr[1]);C.closePath();C.fill();
  C.strokeStyle='#00000030';C.stroke();
  // front roof slope
  C.fillStyle=roofL;
  C.beginPath();C.moveTo(bl2[0],bl2[1]);C.lineTo(ridge1[0],ridge1[1]);C.lineTo(ridge2[0],ridge2[1]);C.lineTo(br2[0],br2[1]);C.closePath();C.fill();
  C.stroke();
  // gable triangles
  C.fillStyle=roofD;
  C.beginPath();C.moveTo(tl[0],tl[1]);C.lineTo(bl2[0],bl2[1]);C.lineTo(ridge1[0],ridge1[1]);C.closePath();C.fill();
  C.beginPath();C.moveTo(tr[0],tr[1]);C.lineTo(br2[0],br2[1]);C.lineTo(ridge2[0],ridge2[1]);C.closePath();C.fill();
  // door
  var doorX=gx+w*0.5;
  var doorBl=[ix(doorX-.45,gy+d),iy(doorX-.45,gy+d)],doorBr=[ix(doorX+.45,gy+d),iy(doorX+.45,gy+d)];
  C.fillStyle='#4a2818';C.beginPath();
  C.moveTo(doorBl[0],doorBl[1]);C.lineTo(doorBr[0],doorBr[1]);C.lineTo(doorBr[0],doorBr[1]-h*.55);C.lineTo(doorBl[0],doorBl[1]-h*.55);
  C.closePath();C.fill();
  // window
  var wcx=gx+w*0.18, wcy=gy+d;
  var wpx=ix(wcx,wcy),wpy=iy(wcx,wcy)-h*.65;
  C.fillStyle='#6a4828';C.fillRect(wpx-2.5,wpy-2,5,4);
  C.fillStyle=winCol;C.fillRect(wpx-2,wpy-1.5,4,3);
  C.strokeStyle='#6a4828';C.lineWidth=.6;
  C.beginPath();C.moveTo(wpx-2,wpy);C.lineTo(wpx+2,wpy);C.stroke();
  C.beginPath();C.moveTo(wpx,wpy-1.5);C.lineTo(wpx,wpy+1.5);C.stroke();
  if(w>3){
    var wcx2=gx+w*0.82;
    var wpx2=ix(wcx2,wcy),wpy2=iy(wcx2,wcy)-h*.65;
    C.fillStyle='#6a4828';C.fillRect(wpx2-2.5,wpy2-2,5,4);
    C.fillStyle=winCol;C.fillRect(wpx2-2,wpy2-1.5,4,3);
    C.strokeStyle='#6a4828';C.lineWidth=.6;
    C.beginPath();C.moveTo(wpx2-2,wpy2);C.lineTo(wpx2+2,wpy2);C.stroke();
    C.beginPath();C.moveTo(wpx2,wpy2-1.5);C.lineTo(wpx2,wpy2+1.5);C.stroke();
  }
  // soft glow - subtle, blends into the scene (no visible ring)
  if(lit){
    var cx=ix(gx+w/2,gy+d/2),cy=iy(gx+w/2,gy+d/2)-h*.7;
    var gr=h*2.2; // larger so the falloff is gradual
    var grad=C.createRadialGradient(cx,cy,0,cx,cy,gr);
    var hex=pal.halo;
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    grad.addColorStop(0,    'rgba('+r+','+g+','+b+',0.14)');
    grad.addColorStop(0.25, 'rgba('+r+','+g+','+b+',0.08)');
    grad.addColorStop(0.55, 'rgba('+r+','+g+','+b+',0.03)');
    grad.addColorStop(0.8,  'rgba('+r+','+g+','+b+',0.01)');
    grad.addColorStop(1,    'rgba('+r+','+g+','+b+',0)');
    C.fillStyle=grad;C.beginPath();C.arc(cx,cy,gr,0,Math.PI*2);C.fill();
  }
}

function cyDrawWindmill(gx,gy,lit){
  var S=1.5; // overall scale - bigger, more eye-catching
  // Tower (cylinder)
  var cx=ix(gx+1.5,gy+1.5),cy=iy(gx+1.5,gy+1.5);
  // shadow
  C.fillStyle='#00000040';
  C.beginPath();C.ellipse(cx,cy+1.5,18*S/1.5,4.5,0,0,Math.PI*2);C.fill();
  // tower body

// COUNTRYSIDE RENDER
function renderCountryside(){
  C.clearRect(0,0,cv.width,cv.height);
  // out-of-bounds background already cleared (canvas transparent); 
  // body background shows through. Draw tiles only inside bounds.
  
  // 1) Tiles
  for(var gy=0;gy<80;gy++)for(var gx=0;gx<80;gx++){
    if(!cyInBounds(gx,gy))continue;
    var tt=cyTileType(gx,gy);
    if(tt==='stream')continue; // stream rendered separately
    var col;
    if(tt==='wheat'){
      var v=(gx*3+gy*7)%5;
      col=v===0?'#e8c060':v===1?'#d8b050':v===2?'#e0b858':v===3?'#d0a848':'#dcb455';
    }else if(tt==='pasture'){
      // Slightly brighter, more vibrant green than regular grass
      var v=(gx*5+gy*3)%4;
      col=v===0?'#98c060':v===1?'#88b050':v===2?'#90b858':'#94bc5c';
    }else if(tt==='flowers'){
      // Lush spring meadow base (flower dots added in pass below)
      var v=(gx*5+gy*3)%4;
      col=v===0?'#90c060':v===1?'#80b050':v===2?'#88b858':'#8cbc5c';
    }else if(tt==='orchard'){
      var v=(gx*5+gy*3)%3;
      col=v===0?'#5a8848':v===1?'#508040':'#609050';
    }else if(tt==='farmyard'){
      var v=(gx+gy)%2;
      col=v?'#a08868':'#988058';
    }else if(tt==='path'){
      var v=(gx+gy)%2;
      col=v?'#b89868':'#a88858';
    }else if(tt==='bridge'){
      var v=(gx+gy)%2;
      col=v?'#b0a898':'#a8a090';
    }else{
      // grass
      var v=(gx*5+gy*3)%4;
      col=v===0?'#88a868':v===1?'#789858':v===2?'#80a060':'#82a26a';
    }
    tile(gx,gy,col);
  }
  
  // 1.5) Flower dots on the flower field
  var FLOWER_COLS=['#ff6090','#ffd040','#c060e0','#ffffff','#ff8030'];
  for(var gy=0;gy<80;gy++)for(var gx=0;gx<80;gx++){
    if(!cyInBounds(gx,gy))continue;
    if(cyTileType(gx,gy)!=='flowers')continue;
    // 3-5 small flower clusters per tile using deterministic hash
    var seed=(gx*73856093)^(gy*19349663);
    function h(){seed=(seed*16807)%2147483647;return((seed&0x7fffffff)/2147483647);}
    var n=3+Math.floor(h()*3);
    for(var k=0;k<n;k++){
      var jx=gx+h(),jy=gy+h();
      var px=ix(jx,jy),py=iy(jx,jy);
      C.fillStyle=FLOWER_COLS[Math.floor(h()*FLOWER_COLS.length)];
      C.beginPath();C.arc(px,py-.5,.9,0,Math.PI*2);C.fill();
      // small green stem hint
      C.fillStyle='#406838';
      C.fillRect(px-.2,py-.3,.4,1);
    }
  }
  
  // 2) Wheat texture (vertical short lines on wheat tiles)
  C.strokeStyle='#7a5028';C.lineWidth=.5;
  for(var gy=0;gy<80;gy++)for(var gx=0;gx<80;gx++){
    if(!cyInBounds(gx,gy))continue;
    if(cyTileType(gx,gy)!=='wheat')continue;
    if(((gx*7+gy*3)%3)!==0)continue;
    for(var i=0;i<2;i++){
      var jx=gx+.2+i*.4,jy=gy+.3+i*.4;
      var px=ix(jx,jy),py=iy(jx,jy);
      C.beginPath();C.moveTo(px,py+1);C.lineTo(px,py+3.5);C.stroke();
    }
  }
  
  // 2.5) Edge cliff faces (depth/thickness of the map)
  cyRenderEdges();
  
  // 3) Stream
  cyRenderStream();
  
  // 4) Bridges (drawn over stream)
  [22,40,58].forEach(function(bgx){
    var sy=cyStreamCenterY(bgx);
    // wooden bridge planks
    for(var bw=-1.5;bw<=1.5;bw+=0.5){
      var v=(bgx+bw)%1<.5?1:0;
      var px=ix(bgx,sy+bw),py=iy(bgx,sy+bw);
      C.fillStyle=v?'#a88858':'#987848';
      C.beginPath();C.moveTo(px,py);C.lineTo(px+TW/2,py+TH/2);C.lineTo(px,py+TH);C.lineTo(px-TW/2,py+TH/2);
      C.closePath();C.fill();
    }
    // railing posts at corners
    C.fillStyle='#5a3818';C.lineWidth=.8;
    [-1.6,1.6].forEach(function(off){
      var p1=[ix(bgx-1,sy+off),iy(bgx-1,sy+off)];
      var p2=[ix(bgx+1,sy+off),iy(bgx+1,sy+off)];
      C.fillRect(p1[0]-.5,p1[1]-4,1,4);
      C.fillRect(p2[0]-.5,p2[1]-4,1,4);
      C.strokeStyle='#5a3818';
      C.beginPath();C.moveTo(p1[0],p1[1]-3);C.lineTo(p2[0],p2[1]-3);C.stroke();
    });
  });
  
  // 5) Build depth-sorted object list
  var dl=[];
  // landmark windmill at (40, 33) - on north side, clear of stream
  dl.push({t:'mill',gx:40,gy:33,d:40+33});
  cyBuildings.forEach(function(b,bi){
    dl.push({t:'b',gx:b[0],gy:b[1],bt:b[2],bw:b[3],bd:b[4],bi:bi,d:b[0]+b[1]});
  });
  cyFarmDecor.forEach(function(f){
    dl.push({t:'d',gx:f[0],gy:f[1],dt:f[2],d:f[0]+f[1]});
  });
  cyLivestock.forEach(function(l){
    dl.push({t:'l',gx:l.gx,gy:l.gy,lt:l.type,face:l.face,d:l.gx+l.gy});
  });
  cyPeople.forEach(function(p){
    dl.push({t:'pp',gx:p.gx,gy:p.gy,p:p,d:p.gx+p.gy+.05});
  });
  cyTrees.forEach(function(t){
    dl.push({t:'t',gx:t[0],gy:t[1],tt:t[2],d:t[0]+t[1]});
  });
  cyHaystacks.forEach(function(h){
    dl.push({t:'h',gx:h[0],gy:h[1],d:h[0]+h[1]});

// Render the thickness/depth edge of the crescent map (cliff face below land)
function cyRenderEdges(){
  var EDGE_H=16;
  // For each in-bound tile, check if its SE neighbors are out of bounds
  // If so, draw a thick "cliff face" extending downward in iso projection
  for(var gy=0;gy<80;gy++){
    for(var gx=0;gx<80;gx++){
      if(!cyInBounds(gx,gy))continue;
      // Right face: when (gx+1, gy) is out of bounds (or at edge)
      var rightOut=!cyInBounds(gx+1,gy);
      // Bottom face: when (gx, gy+1) is out of bounds
      var botOut=!cyInBounds(gx,gy+1);
      if(rightOut){
        // draw a quad from this tile's right edge going down EDGE_H
        var tr=[ix(gx+1,gy),iy(gx+1,gy)];
        var br=[ix(gx+1,gy+1),iy(gx+1,gy+1)];
        C.fillStyle='#4a4030';
        C.beginPath();C.moveTo(tr[0],tr[1]);C.lineTo(br[0],br[1]);C.lineTo(br[0],br[1]+EDGE_H);C.lineTo(tr[0],tr[1]+EDGE_H);C.closePath();C.fill();
        // texture lines (vertical stripes for soil)
        C.strokeStyle='#3a2818';C.lineWidth=.4;
        for(var s=0;s<3;s++){
          var t=(s+1)/4;
          var sx=tr[0]+(br[0]-tr[0])*t,sy=tr[1]+(br[1]-tr[1])*t;
          C.beginPath();C.moveTo(sx,sy);C.lineTo(sx,sy+EDGE_H);C.stroke();
        }
      }
      if(botOut){
        var bl=[ix(gx,gy+1),iy(gx,gy+1)];
        var br=[ix(gx+1,gy+1),iy(gx+1,gy+1)];
        C.fillStyle='#3a3020';
        C.beginPath();C.moveTo(bl[0],bl[1]);C.lineTo(br[0],br[1]);C.lineTo(br[0],br[1]+EDGE_H);C.lineTo(bl[0],bl[1]+EDGE_H);C.closePath();C.fill();
        // texture
        C.strokeStyle='#2a1810';C.lineWidth=.4;
        for(var s=0;s<3;s++){
          var t=(s+1)/4;
          var sx=bl[0]+(br[0]-bl[0])*t,sy=bl[1]+(br[1]-bl[1])*t;
          C.beginPath();C.moveTo(sx,sy);C.lineTo(sx,sy+EDGE_H);C.stroke();
        }
      }
    }
  }
}

// Industrial-looking square robots that walk on platforms.
// Check building collision specifically for walker's own layer.
function fcWalkerHitsBuilding(gx,gy,onDiamond){
  var start = onDiamond ? fcTriBuildings.length : 0;
  var end = onDiamond ? fcBuildings.length : fcTriBuildings.length;
  for(var i=start;i<end;i++){
    var b=fcBuildings[i];
    // 1.2 buffer = robot stays clear of building visual footprint
    if(gx>=b[0]-1.2 && gx<=b[0]+b[3]+1.2 && gy>=b[1]-1.2 && gy<=b[1]+b[4]+1.2){
      return true;
    }
  }
  return false;
}
function fcWalkerOk(gx,gy,onDiamond){
  if(onDiamond){
    if(!fcInDiamond(gx,gy))return false;
    if(fcWalkerHitsBuilding(gx,gy,true))return false;
    return true;
  }else{
    if(!fcInTriangle(gx,gy))return false;
    if(fcInDiamond(gx,gy))return false; // triangle walker can't be under diamond
    if(fcWalkerHitsBuilding(gx,gy,false))return false;
    return true;
  }
}

function updateFcWalker(rb,dt){
  if(rb.rest>0){rb.rest-=dt;return;}
  var dx=rb.tx-rb.gx, dy=rb.ty-rb.gy;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<0.3){
    rb.rest=0.5+Math.random()*2;
    for(var k=0;k<30;k++){
      var nx, ny;
      if(rb.onDia){nx=27+Math.random()*26;ny=27+Math.random()*26;}
      else{nx=15+Math.random()*50;ny=15+Math.random()*45;}
      if(fcWalkerOk(nx,ny,rb.onDia)){rb.tx=nx;rb.ty=ny;break;}
    }
    return;
  }
  rb.phase=(rb.phase+rb.speed*dt*3)%1;
  var step=rb.speed*dt;
  var nx=rb.gx+(dx/dist)*step;
  var ny=rb.gy+(dy/dist)*step;
  if(!fcWalkerOk(nx,ny,rb.onDia)){
    // pick new target
    for(var k=0;k<20;k++){
      var tx, ty;
      if(rb.onDia){tx=27+Math.random()*26;ty=27+Math.random()*26;}
      else{tx=15+Math.random()*50;ty=15+Math.random()*45;}
      if(fcWalkerOk(tx,ty,rb.onDia)){rb.tx=tx;rb.ty=ty;break;}
    }
    return;
  }
  rb.gx=nx; rb.gy=ny;
  if(Math.abs(dx)>Math.abs(dy))rb.face=dx>0?1:-1;
}

function fcInAnyPlatform(gx,gy){return fcInTriangle(gx,gy)||fcInDiamond(gx,gy);}

function updateFcRobot(rb,dt){
  // bob phase always advances (gives a "floating" idle motion)
  rb.phase+=dt*1.5;
  if(rb.rest>0){
    rb.rest-=dt;
    return;
  }
  var dx=rb.tx-rb.gx, dy=rb.ty-rb.gy, dAlt=rb.tAlt-rb.alt;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<0.5 && Math.abs(dAlt)<3){
    // arrived - rest, pick new target
    rb.rest=0.5+Math.random()*2;
    for(var k=0;k<30;k++){
      var nx=18+Math.random()*44, ny=18+Math.random()*40;
      if(fcInAnyPlatform(nx,ny)){rb.tx=nx;rb.ty=ny;break;}
    }
    rb.tAlt=30+Math.random()*60;
    return;
  }
  var step=rb.speed*dt;
  if(dist>0.1){
    rb.gx+=(dx/dist)*step;
    rb.gy+=(dy/dist)*step;
  }
  // altitude moves toward target separately
  rb.alt+=Math.sign(dAlt)*Math.min(Math.abs(dAlt),step*15);
}

// Check if a point (gx, gy) is occupied by any building in the given list,
// with a small buffer so the neon line doesn't sit right against the wall.
function fcPointInBuilding(gx, gy, buildings){
  for(var i=0;i<buildings.length;i++){
    var b=buildings[i];
    if(gx>=b[0]-0.2 && gx<=b[0]+b[3]+0.2 && gy>=b[1]-0.2 && gy<=b[1]+b[4]+0.2) return true;
  }
  return false;
}

// Draw a neon line from (x1,y1) to (x2,y2), but skip any sub-segments that
// pass through buildings OR outside the layer bounds. Result: line breaks
// naturally around buildings and gets clipped at platform edges.
function fcDrawLineWithGaps(x1,y1,x2,y2,buildings,inLayer,lift){
  var dx=x2-x1, dy=y2-y1;
  var len=Math.sqrt(dx*dx+dy*dy);
  var step=0.3;
  var nSteps=Math.ceil(len/step);
  var subStart=null;
  for(var i=0;i<=nSteps;i++){
    var t=i/nSteps;
    var px=x1+dx*t, py=y1+dy*t;
    // A point is "drawable" if it's in the layer AND not in any building
    var drawable = inLayer(px,py) && !fcPointInBuilding(px,py,buildings);
    if(drawable){
      if(subStart===null)subStart=[px,py];
    }else{
      if(subStart!==null){
        // close out current sub-segment up to the previous (drawable) point
        var bt=(i-1)/nSteps;
        var bx=x1+dx*bt, by=y1+dy*bt;
        var p1=[ix(subStart[0],subStart[1]), iy(subStart[0],subStart[1])-lift];
        var p2=[ix(bx,by), iy(bx,by)-lift];
        C.beginPath();C.moveTo(p1[0],p1[1]);C.lineTo(p2[0],p2[1]);C.stroke();
        subStart=null;
      }
    }
  }
  // Close trailing segment
  if(subStart){
    var p1=[ix(subStart[0],subStart[1]), iy(subStart[0],subStart[1])-lift];
    var p2=[ix(x2,y2), iy(x2,y2)-lift];
    C.beginPath();C.moveTo(p1[0],p1[1]);C.lineTo(p2[0],p2[1]);C.stroke();
  }
}

// Draw multiple neon road lines, each with its own color. Each line is
// [x1, y1, x2, y2, color] - color is optional, defaults to fallback.
function fcDrawNeonStreets(buildings, inLayer, lift, fallbackColor, lines){
  lines.forEach(function(line){
    var color=line[4]||fallbackColor;
    C.save();
    C.shadowColor=color;
    C.shadowBlur=10;
    C.strokeStyle=color;
    C.lineWidth=1.5;
    fcDrawLineWithGaps(line[0],line[1],line[2],line[3],buildings,inLayer,lift);
    C.restore();
  });
}

// Draw a platform with thickness. Top edge gets a glowing neon outline
// (using shadowBlur for the glow effect).
function fcDrawSolidPlatform(vertices, lift, thickness, topCol, sideCol, edgeCol){
  // Side faces
  var cxAvg=0, cyAvg=0;
  vertices.forEach(function(v){cxAvg+=v[0];cyAvg+=v[1];});
  cxAvg/=vertices.length; cyAvg/=vertices.length;
  for(var i=0;i<vertices.length;i++){
    var v1=vertices[i], v2=vertices[(i+1)%vertices.length];
    var midGx=(v1[0]+v2[0])/2, midGy=(v1[1]+v2[1])/2;
    var midPx=ix(midGx,midGy)-ix(cxAvg,cyAvg);
    var midPy=iy(midGx,midGy)-iy(cxAvg,cyAvg);
    if(midPy<0)continue;
    var p1=[ix(v1[0],v1[1]), iy(v1[0],v1[1])-lift];
    var p2=[ix(v2[0],v2[1]), iy(v2[0],v2[1])-lift];
    C.fillStyle=sideCol;
    C.beginPath();
    C.moveTo(p1[0],p1[1]);
    C.lineTo(p2[0],p2[1]);
    C.lineTo(p2[0],p2[1]+thickness);
    C.lineTo(p1[0],p1[1]+thickness);
    C.closePath();C.fill();
  }
  // Top face
  C.fillStyle=topCol;
  C.beginPath();
  vertices.forEach(function(v,i){
    var px=ix(v[0],v[1]), py=iy(v[0],v[1])-lift;
    if(i===0)C.moveTo(px,py); else C.lineTo(px,py);
  });
  C.closePath();C.fill();
  // Neon edge with glow - the "lit road edge" look
  if(edgeCol){
    C.save();
    // Outer glow pass
    C.shadowColor=edgeCol;
    C.shadowBlur=12;
    C.strokeStyle=edgeCol;
    C.lineWidth=2;
    C.stroke();
    // Inner crisp pass
    C.shadowBlur=4;
    C.lineWidth=1;
    C.stroke();
    C.restore();
  }
}

// --- BUILDING DRAWERS ---

function fcDrawCapsule(gx,gy,w,d,lit,lift,hScale){
  var pal=lit>0?FC_LIT[(lit-1)%FC_LIT.length]:null;
  // Body is ALWAYS dark (default). Only top + windows get lit color.
  var body=FC_BODY;
  var shade=FC_SHADE;
  var edge=FC_EDGE;
  var litCol=pal?pal.body:FC_EDGE;
  var glowCol=pal?pal.glow:null;
  var h=(10+Math.min(w,d)*1.5)*(hScale||1);
  var cx=ix(gx+w/2,gy+d/2), cy=iy(gx+w/2,gy+d/2)-lift;
  var hr=Math.min(w,d)*TW/2.4;
  // shadow
  C.fillStyle='#00000060';
  C.beginPath();C.ellipse(cx,cy+1,hr,hr*0.35,0,0,Math.PI*2);C.fill();
  // cylinder body (always dark)
  C.fillStyle=shade;
  C.beginPath();
  C.moveTo(cx-hr,cy);C.lineTo(cx-hr,cy-h);C.lineTo(cx+hr,cy-h);C.lineTo(cx+hr,cy);
  C.ellipse(cx,cy,hr,hr*0.35,0,0,Math.PI);
  C.closePath();C.fill();
  // body left-side highlight
  C.fillStyle=body;
  C.beginPath();
  C.moveTo(cx-hr,cy);C.lineTo(cx-hr,cy-h);C.lineTo(cx-hr*0.5,cy-h);C.lineTo(cx-hr*0.5,cy);
  C.closePath();C.fill();
  // === TOP HEMISPHERE - lit color when active ===
  if(lit){
    C.save();
    C.shadowColor=glowCol;
    C.shadowBlur=8;
    C.fillStyle=litCol;
    C.beginPath();C.ellipse(cx,cy-h,hr,hr*0.4,0,Math.PI,0);C.fill();
    C.restore();
    // inner dome shade
    C.fillStyle=pal.shade;
    C.beginPath();C.ellipse(cx,cy-h-0.5,hr*0.6,hr*0.25,0,Math.PI,0);C.fill();
  }else{
    C.fillStyle=body;
    C.beginPath();C.ellipse(cx,cy-h,hr,hr*0.4,0,Math.PI,0);C.fill();
    C.fillStyle=shade;
    C.beginPath();C.ellipse(cx,cy-h-0.5,hr*0.6,hr*0.25,0,Math.PI,0);C.fill();
  }
  // === WINDOW BANDS - lit color when active ===
  if(lit){
    C.save();
    C.shadowColor=glowCol;
    C.shadowBlur=6;
    C.strokeStyle=pal.edge;
    C.lineWidth=1.2;
    for(var b=0;b<3;b++){
      var by=cy-3-b*(h-4)/3;
      C.beginPath();C.moveTo(cx-hr+1,by);C.lineTo(cx+hr-1,by);C.stroke();
    }
    C.restore();
  }else{
    C.strokeStyle=edge;C.lineWidth=0.8;
    for(var b=0;b<3;b++){
      var by=cy-3-b*(h-4)/3;
      C.beginPath();C.moveTo(cx-hr+1,by);C.lineTo(cx+hr-1,by);C.stroke();
    }
  }
  // outer halo
  if(lit){
    var grad=C.createRadialGradient(cx,cy-h*0.7,0,cx,cy-h*0.7,h*1.6);
    var hex=glowCol;
    var rC=parseInt(hex.slice(1,3),16),gC=parseInt(hex.slice(3,5),16),bC=parseInt(hex.slice(5,7),16);
    grad.addColorStop(0,'rgba('+rC+','+gC+','+bC+',0.16)');
    grad.addColorStop(0.5,'rgba('+rC+','+gC+','+bC+',0.05)');
    grad.addColorStop(1,'rgba('+rC+','+gC+','+bC+',0)');
    C.fillStyle=grad;C.beginPath();C.arc(cx,cy-h*0.7,h*1.6,0,Math.PI*2);C.fill();
  }
}

function fcDrawInvPyramid(gx,gy,w,d,lit,lift,hScale){
  var pal=lit>0?FC_LIT[(lit-1)%FC_LIT.length]:null;
  // Side faces always dark, only top face lights up
  var body=FC_BODY;
  var shade=FC_SHADE;
  var edge=FC_EDGE;
  var litCol=pal?pal.body:FC_EDGE;
  var glowCol=pal?pal.glow:null;
  var h=(12+w)*(hScale||1);
  var cx=ix(gx+w/2,gy+d/2), cy=iy(gx+w/2,gy+d/2)-lift;
  var baseX=cx, baseY=cy;
  var tl=[ix(gx,gy),iy(gx,gy)-lift-h];
  var tr=[ix(gx+w,gy),iy(gx+w,gy)-lift-h];
  var br=[ix(gx+w,gy+d),iy(gx+w,gy+d)-lift-h];
  var bl=[ix(gx,gy+d),iy(gx,gy+d)-lift-h];
  // shadow
  C.fillStyle='#00000060';
  C.beginPath();C.ellipse(baseX,baseY+1,4,1.5,0,0,Math.PI*2);C.fill();
  // side faces - always dark
  C.fillStyle=shade;
  C.beginPath();C.moveTo(baseX,baseY);C.lineTo(tr[0],tr[1]);C.lineTo(br[0],br[1]);C.closePath();C.fill();
  C.fillStyle=body;
  C.beginPath();C.moveTo(baseX,baseY);C.lineTo(br[0],br[1]);C.lineTo(bl[0],bl[1]);C.closePath();C.fill();
  // === TOP FACE - lit when active ===
  if(lit){
    C.save();
    C.shadowColor=glowCol;
    C.shadowBlur=10;
    C.fillStyle=litCol;
    C.beginPath();C.moveTo(tl[0],tl[1]);C.lineTo(tr[0],tr[1]);C.lineTo(br[0],br[1]);C.lineTo(bl[0],bl[1]);C.closePath();C.fill();
    C.restore();
    // inset darker square (the "skylight" inset)
    C.fillStyle=pal.shade;
    var inset=0.2;
    C.beginPath();
    C.moveTo(ix(gx+inset,gy+inset),iy(gx+inset,gy+inset)-lift-h);
    C.lineTo(ix(gx+w-inset,gy+inset),iy(gx+w-inset,gy+inset)-lift-h);
    C.lineTo(ix(gx+w-inset,gy+d-inset),iy(gx+w-inset,gy+d-inset)-lift-h);
    C.lineTo(ix(gx+inset,gy+d-inset),iy(gx+inset,gy+d-inset)-lift-h);
    C.closePath();C.fill();
  }else{
    C.fillStyle=body;
    C.beginPath();C.moveTo(tl[0],tl[1]);C.lineTo(tr[0],tr[1]);C.lineTo(br[0],br[1]);C.lineTo(bl[0],bl[1]);C.closePath();C.fill();
    C.fillStyle=shade;
    var inset=0.2;
    C.beginPath();
    C.moveTo(ix(gx+inset,gy+inset),iy(gx+inset,gy+inset)-lift-h);
    C.lineTo(ix(gx+w-inset,gy+inset),iy(gx+w-inset,gy+inset)-lift-h);
    C.lineTo(ix(gx+w-inset,gy+d-inset),iy(gx+w-inset,gy+d-inset)-lift-h);
    C.lineTo(ix(gx+inset,gy+d-inset),iy(gx+inset,gy+d-inset)-lift-h);
    C.closePath();C.fill();
  }
  // edges (always shown, but brighter when lit)
  C.strokeStyle=lit?pal.edge:edge;
  C.lineWidth=lit?1.2:1;
  C.beginPath();C.moveTo(baseX,baseY);C.lineTo(tl[0],tl[1]);C.stroke();
  C.beginPath();C.moveTo(baseX,baseY);C.lineTo(tr[0],tr[1]);C.stroke();
  C.beginPath();C.moveTo(baseX,baseY);C.lineTo(br[0],br[1]);C.stroke();
  C.beginPath();C.moveTo(baseX,baseY);C.lineTo(bl[0],bl[1]);C.stroke();
  C.beginPath();
  C.moveTo(tl[0],tl[1]);C.lineTo(tr[0],tr[1]);C.lineTo(br[0],br[1]);C.lineTo(bl[0],bl[1]);
  C.closePath();C.stroke();
  if(lit){
    var grad=C.createRadialGradient(cx,cy-h*0.8,0,cx,cy-h*0.8,h*1.5);
    var hex=glowCol;
    var rC=parseInt(hex.slice(1,3),16),gC=parseInt(hex.slice(3,5),16),bC=parseInt(hex.slice(5,7),16);
    grad.addColorStop(0,'rgba('+rC+','+gC+','+bC+',0.16)');
    grad.addColorStop(0.5,'rgba('+rC+','+gC+','+bC+',0.05)');
    grad.addColorStop(1,'rgba('+rC+','+gC+','+bC+',0)');
    C.fillStyle=grad;C.beginPath();C.arc(cx,cy-h*0.8,h*1.5,0,Math.PI*2);C.fill();
  }
}

function fcDrawDisc(gx,gy,w,d,lit,lift,hScale){
  var pal=lit>0?FC_LIT[(lit-1)%FC_LIT.length]:null;
  // Lower disc + pillar = dark. Upper disc + dome + lights = lit.
  var body=FC_BODY;
  var shade=FC_SHADE;
  var edge=FC_EDGE;
  var litCol=pal?pal.body:FC_EDGE;
  var glowCol=pal?pal.glow:null;
  var s=hScale||1;
  var cx=ix(gx+w/2,gy+d/2), cy=iy(gx+w/2,gy+d/2)-lift;
  var hr=Math.min(w,d)*TW/2.2;
  var floatH=4+s*6;
  // shadow
  C.fillStyle='#00000060';
  C.beginPath();C.ellipse(cx,cy+1,hr*0.7,hr*0.2,0,0,Math.PI*2);C.fill();
  // lower half - always dark
  C.fillStyle=shade;
  C.beginPath();C.ellipse(cx,cy-floatH,hr,hr*0.4,0,0,Math.PI);C.fill();
  // === UPPER HALF - lit ===
  if(lit){
    C.save();
    C.shadowColor=glowCol;
    C.shadowBlur=8;
    C.fillStyle=litCol;
    C.beginPath();C.ellipse(cx,cy-floatH,hr,hr*0.4,0,Math.PI,0);C.fill();
    C.restore();
  }else{
    C.fillStyle=body;
    C.beginPath();C.ellipse(cx,cy-floatH,hr,hr*0.4,0,Math.PI,0);C.fill();
  }
  // central dome
  var domeR=hr*0.5;
  if(lit){
    C.save();
    C.shadowColor=glowCol;
    C.shadowBlur=6;
    C.fillStyle=litCol;
    C.beginPath();C.ellipse(cx,cy-floatH-3,domeR,domeR*0.5,0,Math.PI,0);C.fill();
    C.restore();
  }else{
    C.fillStyle=body;
    C.beginPath();C.ellipse(cx,cy-floatH-3,domeR,domeR*0.5,0,Math.PI,0);C.fill();
  }
  // dome highlight
  C.fillStyle=lit?pal.edge:edge;
  C.beginPath();C.ellipse(cx-domeR*0.3,cy-floatH-4,domeR*0.3,domeR*0.2,0,Math.PI,0);C.fill();
  // ring lights along disc edge - brighter when lit
  if(lit){
    C.save();
    C.shadowColor=glowCol;
    C.shadowBlur=5;
    C.fillStyle=pal.edge;
    for(var i=0;i<6;i++){
      var a=i/6*Math.PI*2;
      var lx=cx+Math.cos(a)*hr*0.85;
      var ly=cy-floatH+Math.sin(a)*hr*0.35;
      C.beginPath();C.arc(lx,ly,1.4,0,Math.PI*2);C.fill();
    }
    C.restore();
  }else{
    C.fillStyle=edge;
    for(var i=0;i<6;i++){
      var a=i/6*Math.PI*2;
      var lx=cx+Math.cos(a)*hr*0.85;
      var ly=cy-floatH+Math.sin(a)*hr*0.35;
      C.beginPath();C.arc(lx,ly,1,0,Math.PI*2);C.fill();
    }
  }
  // support column - always dark
  C.fillStyle=shade;
  C.fillRect(cx-1,cy-floatH+2,2,floatH);
  if(lit){
    var ugrad=C.createRadialGradient(cx,cy,0,cx,cy,hr*1.4);
    var hex=glowCol;
    var rC=parseInt(hex.slice(1,3),16),gC=parseInt(hex.slice(3,5),16),bC=parseInt(hex.slice(5,7),16);
    ugrad.addColorStop(0,'rgba('+rC+','+gC+','+bC+',0.4)');
    ugrad.addColorStop(0.6,'rgba('+rC+','+gC+','+bC+',0.12)');
    ugrad.addColorStop(1,'rgba('+rC+','+gC+','+bC+',0)');
    C.fillStyle=ugrad;C.beginPath();C.ellipse(cx,cy,hr*1.4,hr*0.5,0,0,Math.PI*2);C.fill();
  }
}

function fcDrawCrystal(gx,gy,w,d,lit,lift,hScale){
  var pal=lit>0?FC_LIT[(lit-1)%FC_LIT.length]:null;
  // Hex prism body always dark. Pyramid tip + edges glow when lit.
  var body=FC_BODY;
  var shade=FC_SHADE;
  var edge=FC_EDGE;
  var litCol=pal?pal.body:FC_EDGE;
  var glowCol=pal?pal.glow:null;
  var h=(18+w*1.5)*(hScale||1);
  var cx=ix(gx+w/2,gy+d/2), cy=iy(gx+w/2,gy+d/2)-lift;
  var hr=Math.min(w,d)*TW/2.6;
  C.fillStyle='#00000060';
  C.beginPath();C.ellipse(cx,cy+1,hr*0.9,hr*0.3,0,0,Math.PI*2);C.fill();
  var hexPts=[];
  for(var i=0;i<6;i++){
    var a=i/6*Math.PI*2+Math.PI/6;
    hexPts.push([cx+Math.cos(a)*hr, cy+Math.sin(a)*hr*0.4]);
  }
  // bottom hex (always dark)
  C.fillStyle=shade;
  C.beginPath();
  hexPts.forEach(function(p,i){if(i===0)C.moveTo(p[0],p[1]);else C.lineTo(p[0],p[1]);});
  C.closePath();C.fill();
  // 6 prism side faces (always dark)
  for(var i=0;i<6;i++){
    var p1=hexPts[i], p2=hexPts[(i+1)%6];
    var midY=(p1[1]+p2[1])/2;
    if(midY<cy-1)continue;
    C.fillStyle=i%2===0?body:shade;
    C.beginPath();
    C.moveTo(p1[0],p1[1]);C.lineTo(p2[0],p2[1]);
    C.lineTo(p2[0],p2[1]-h);C.lineTo(p1[0],p1[1]-h);
    C.closePath();C.fill();
  }
  // === TOP HEX FACE - lit ===
  if(lit){
    C.save();
    C.shadowColor=glowCol;
    C.shadowBlur=6;
    C.fillStyle=litCol;
    C.beginPath();
    hexPts.forEach(function(p,i){
      if(i===0)C.moveTo(p[0],p[1]-h);else C.lineTo(p[0],p[1]-h);
    });
    C.closePath();C.fill();
    C.restore();
  }else{
    C.fillStyle=body;
    C.beginPath();
    hexPts.forEach(function(p,i){
      if(i===0)C.moveTo(p[0],p[1]-h);else C.lineTo(p[0],p[1]-h);
    });
    C.closePath();C.fill();
  }
  // === PYRAMID TIP - lit ===
  var apex=[cx, cy-h-hr*1.4];
  if(lit){
    C.save();
    C.shadowColor=glowCol;
    C.shadowBlur=8;
    for(var i=0;i<6;i++){
      var p1=hexPts[i], p2=hexPts[(i+1)%6];
      var p1t=[p1[0],p1[1]-h], p2t=[p2[0],p2[1]-h];
      C.fillStyle=i%2===0?litCol:pal.shade;
      C.beginPath();
      C.moveTo(p1t[0],p1t[1]);C.lineTo(p2t[0],p2t[1]);C.lineTo(apex[0],apex[1]);
      C.closePath();C.fill();
    }
    C.restore();
  }else{
    for(var i=0;i<6;i++){
      var p1=hexPts[i], p2=hexPts[(i+1)%6];
      var p1t=[p1[0],p1[1]-h], p2t=[p2[0],p2[1]-h];
      C.fillStyle=i%2===0?body:shade;
      C.beginPath();
      C.moveTo(p1t[0],p1t[1]);C.lineTo(p2t[0],p2t[1]);C.lineTo(apex[0],apex[1]);
      C.closePath();C.fill();
    }
  }
  // edge lines - brighter when lit
  C.strokeStyle=lit?pal.edge:edge;
  C.lineWidth=lit?1.2:0.8;
  for(var i=0;i<6;i++){
    C.beginPath();
    C.moveTo(hexPts[i][0],hexPts[i][1]);
    C.lineTo(hexPts[i][0],hexPts[i][1]-h);
    C.lineTo(apex[0],apex[1]);
    C.stroke();
  }
  if(lit){
    var grad=C.createRadialGradient(cx,cy-h*0.8,0,cx,cy-h*0.8,h*1.4);
    var hex=glowCol;
    var rC=parseInt(hex.slice(1,3),16),gC=parseInt(hex.slice(3,5),16),bC=parseInt(hex.slice(5,7),16);
    grad.addColorStop(0,'rgba('+rC+','+gC+','+bC+',0.18)');
    grad.addColorStop(0.5,'rgba('+rC+','+gC+','+bC+',0.06)');
    grad.addColorStop(1,'rgba('+rC+','+gC+','+bC+',0)');
    C.fillStyle=grad;C.beginPath();C.arc(cx,cy-h*0.8,h*1.4,0,Math.PI*2);C.fill();
  }
}

function fcDrawLandmark(lit){
  var lift=FC_DIAMOND_LIFT;
  var cx=ix(40,40), cy=iy(40,40)-lift;
  // TALL central crystal - taller than other buildings but not unreachable
  fcDrawCrystal(38.5,38.5,3,3,lit,lift,3);
  // spinning outer ring (positioned for the new height)
  var ringY=cy-55;
  var t=performance.now()*0.001;
  C.strokeStyle=lit?'#ff80ff':'#a060ff';
  C.lineWidth=1.8;
  for(var seg=0;seg<24;seg++){
    var a1=(seg/24)*Math.PI*2+t;
    var a2=((seg+0.6)/24)*Math.PI*2+t;
    var r1=18;
    C.beginPath();
    C.moveTo(cx+Math.cos(a1)*r1, ringY+Math.sin(a1)*r1*0.4);
    C.lineTo(cx+Math.cos(a2)*r1, ringY+Math.sin(a2)*r1*0.4);
    C.stroke();
  }
  // inner counter-rotating ring
  C.strokeStyle=lit?'#80ffff':'#60a0ff';
  C.lineWidth=1.2;
  for(var seg=0;seg<16;seg++){
    var a1=(seg/16)*Math.PI*2-t*1.5;
    var a2=((seg+0.6)/16)*Math.PI*2-t*1.5;
    var r1=12;
    C.beginPath();
    C.moveTo(cx+Math.cos(a1)*r1, ringY-12+Math.sin(a1)*r1*0.4);
    C.lineTo(cx+Math.cos(a2)*r1, ringY-12+Math.sin(a2)*r1*0.4);
    C.stroke();
  }
  if(lit){
    var grad=C.createRadialGradient(cx,cy-30,0,cx,cy-30,70);
    grad.addColorStop(0,'rgba(255,100,255,0.22)');
    grad.addColorStop(0.4,'rgba(160,80,255,0.1)');
    grad.addColorStop(1,'rgba(160,80,255,0)');
    C.fillStyle=grad;C.beginPath();C.arc(cx,cy-30,70,0,Math.PI*2);C.fill();
  }
}

function renderFuture(){
  C.clearRect(0,0,cv.width,cv.height);
  
  // === BOTTOM PLATFORM (triangle) ===
  var triVerts=[[40,14],[65,60],[15,60]];
  fcDrawSolidPlatform(triVerts, 0, 24, '#3a3258', '#241838', null);
  // A few main streets - hardcoded paths that wind through the buildings
  var triStreets=[
    // diagonal from apex toward bottom-right (purple)
    [40,18, 58,55, '#c060ff'],
    // diagonal from apex toward bottom-left (purple)
    [40,18, 22,55, '#c060ff'],
    // horizontal across middle (CYAN accent)
    [22,45, 58,45, '#00e8ff'],
    // shorter horizontal lower (purple)
    [25,55, 55,55, '#c060ff'],
    // vertical down center-left (CYAN accent)
    [33,22, 33,57, '#00e8ff'],
    // vertical down center-right (purple)
    [47,22, 47,57, '#c060ff'],
  ];
  fcDrawNeonStreets(fcTriBuildings, fcInTriangle, 0, '#c060ff', triStreets);

// Pentatonic scale (C major: C D E G A) across two octaves — folk/country feel.

// Banjo synth: Karplus-Strong with fast decay + metallic pluck attack + 
// drumhead resonance. The short "plinky" bluegrass sound.
function playGuitar(freq,dur){
  if(!actx)return;
  var sr=actx.sampleRate;
  var totalSamples=Math.floor(sr*dur);
  var period=Math.floor(sr/freq);
  
  var buf=actx.createBuffer(1,totalSamples,sr);
  var data=buf.getChannelData(0);
  
  // Karplus-Strong with VERY fast decay (banjo is short and snappy)
  var delay=new Float32Array(period);
  for(var i=0;i<period;i++)delay[i]=(Math.random()*2-1);
  var idx=0;
  var decay=0.987; // medium-fast decay (between 0.982 too short and 0.990 too long)
  for(var i=0;i<totalSamples;i++){
    var cur=delay[idx];
    var nxt=delay[(idx+1)%period];
    // banjo loop is brighter (less averaging = less LP)
    var v=(cur*0.65+nxt*0.35)*decay;
    delay[idx]=v;
    data[i]=cur*0.75;
    idx=(idx+1)%period;
  }
  
  // Metallic pluck attack: very short bright noise (4ms)
  var pickLen=Math.floor(sr*0.004);
  for(var i=0;i<pickLen;i++){
    var t=i/pickLen;
    var sign=(i%2===0)?1:-1;
    data[i]+=sign*(Math.random())*0.7*(1-t);
  }
  
  // Envelope: fast attack, very sharp decay (snappier)
  for(var i=0;i<totalSamples;i++){
    var t=i/totalSamples;
    var env;
    if(t<0.002)env=t/0.002;       // 2ms attack
    else env=Math.pow(1-t,1.8);    // sharp falloff but with a bit more tail
    data[i]*=env;
  }
  
  var src=actx.createBufferSource();
  src.buffer=buf;
  
  // High-pass: kill muddy lows
  var hp=actx.createBiquadFilter();
  hp.type='highpass';
  hp.frequency.value=220;
  hp.Q.value=0.5;
  
  // Drumhead resonance: subtle so basic pitch reads clearly
  var ring=actx.createBiquadFilter();
  ring.type='peaking';
  ring.frequency.value=2500;
  ring.Q.value=2;
  ring.gain.value=3;
  
  // Top lowpass
  var top=actx.createBiquadFilter();
  top.type='lowpass';
  top.frequency.value=6000;
  top.Q.value=0.7;
  
  var g=actx.createGain();
  var vol=Math.min(.28,(zScale-.5)*.18);
  if(vol<.02)vol=.02;
  g.gain.value=vol;
  
  src.connect(hp);hp.connect(ring);ring.connect(top);top.connect(g);g.connect(actx.destination);
  src.start();
}

// Pentatonic-like scale shifted up an octave for "digital" feel
var FC_NOTES=[261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00];

// Synth voice profiles - each building type gets a different voice character.
// 0=Pluck (short, sharp), 1=Pad (long, sustained), 2=Buzz (heavy distortion),
// 3=Wobble (strong vibrato + filter LFO).
function playSynth(freq, dur, profile){
  if(!actx)return;
  var t=actx.currentTime;
  profile=profile||0;
  
  // Per-profile params
  var pad = profile===1;
  var buzz = profile===2;
  var wobble = profile===3;
  
  var actualDur = pad ? dur*1.8 : (buzz ? dur*0.8 : dur);
  
  var g=actx.createGain();
  var vol=Math.min(.22,(zScale-.5)*.15);
  if(vol<.02)vol=.02;
  if(pad)vol*=0.85; // pad slightly quieter since it sustains longer
  if(buzz)vol*=0.9;
  
  // ADSR per profile
  g.gain.setValueAtTime(0,t);
  if(pad){
    // slow attack, long sustain
    g.gain.linearRampToValueAtTime(vol,t+0.08);
    g.gain.linearRampToValueAtTime(vol*0.85,t+actualDur*0.6);
    g.gain.exponentialRampToValueAtTime(.001,t+actualDur);
  }else if(buzz){
    // immediate attack, sustained body, hard cutoff
    g.gain.linearRampToValueAtTime(vol,t+0.003);
    g.gain.linearRampToValueAtTime(vol*0.7,t+actualDur*0.5);
    g.gain.exponentialRampToValueAtTime(.001,t+actualDur);
  }else{
    // pluck-style or wobble: snappy attack, fast decay
    g.gain.linearRampToValueAtTime(vol,t+0.005);
    g.gain.linearRampToValueAtTime(vol*0.6,t+0.05);
    g.gain.exponentialRampToValueAtTime(.001,t+actualDur);
  }

  // Filter
  var f=actx.createBiquadFilter();
  f.type='lowpass';
  if(buzz){
    // razor-thin resonance, very bright stable filter
    f.Q.value=14;
    f.frequency.setValueAtTime(freq*16,t);
    f.frequency.exponentialRampToValueAtTime(freq*4,t+actualDur*0.3);
  }else if(pad){
    // gentle, opens slowly
    f.Q.value=3;
    f.frequency.setValueAtTime(freq*4,t);
    f.frequency.linearRampToValueAtTime(freq*10,t+actualDur*0.5);
    f.frequency.exponentialRampToValueAtTime(freq*3,t+actualDur);
  }else if(wobble){
    // filter LFO for wobble bass effect
    f.Q.value=10;
    f.frequency.setValueAtTime(freq*6,t);
  }else{
    // pluck - classic sweep
    f.Q.value=8;
    f.frequency.setValueAtTime(freq*12,t);
    f.frequency.exponentialRampToValueAtTime(freq*1.5,t+actualDur*0.5);
  }

  // Waveshaper distortion - amount per profile
  var ws=actx.createWaveShaper();
  var curve=new Float32Array(256);
  var dist = buzz ? 5.0 : (pad ? 1.2 : 2.5);
  for(var i=0;i<256;i++){
    var x=(i-128)/128;
    curve[i]=Math.tanh(x*dist)*0.8;
  }
  ws.curve=curve;
  ws.oversample='2x';

  // Vibrato LFO - depth and rate per profile
  var lfo=actx.createOscillator();
  lfo.type='sine';
  lfo.frequency.value = wobble ? 8 : (pad ? 3 : 6);
  var lfoG=actx.createGain();
  var vibDepth = wobble ? freq*0.04 : (pad ? freq*0.008 : freq*0.015);
  lfoG.gain.value = vibDepth;

  // Filter LFO for wobble profile
  var filterLfo = null, filterLfoG = null;
  if(wobble){
    filterLfo = actx.createOscillator();
    filterLfo.type='sine';
    filterLfo.frequency.value=5;
    filterLfoG = actx.createGain();
    filterLfoG.gain.value = freq*4;
    filterLfo.connect(filterLfoG);
    filterLfoG.connect(f.frequency);
  }

  // Saw lead (always present)
  var saw1=actx.createOscillator();
  saw1.type='sawtooth';
  saw1.frequency.value=freq;
  lfo.connect(lfoG);lfoG.connect(saw1.frequency);
  var saw2=actx.createOscillator();
  saw2.type='sawtooth';
  saw2.frequency.value = freq * (pad ? 1.015 : 1.008); // pad has wider detune
  lfoG.connect(saw2.frequency);

  // Pad adds a third detuned saw for thickness
  var saw3 = null;
  if(pad){
    saw3 = actx.createOscillator();
    saw3.type='sawtooth';
    saw3.frequency.value = freq * 0.992;
    lfoG.connect(saw3.frequency);
  }

  // Square (crunch) - except for pad which stays smooth
  var sq=null, sqG=null;
  if(!pad){
    sq=actx.createOscillator();
    sq.type='square';
    sq.frequency.value=freq;
    sqG=actx.createGain();
    sqG.gain.value = buzz ? 0.55 : 0.35;
  }

  // Sub sine
  var sub=actx.createOscillator();
  sub.type='sine';
  sub.frequency.value=freq*0.5;
  var subG=actx.createGain();
  subG.gain.value = pad ? 0.5 : 0.4;

  // Wire up
  saw1.connect(ws);
  saw2.connect(ws);
  if(saw3)saw3.connect(ws);
  if(sq){sq.connect(sqG);sqG.connect(ws);}
  sub.connect(subG);subG.connect(f);
  ws.connect(f);
  f.connect(g);g.connect(actx.destination);

  saw1.start(t);saw2.start(t);sub.start(t);lfo.start(t);
  if(saw3)saw3.start(t);
  if(sq)sq.start(t);
  if(filterLfo)filterLfo.start(t);
  saw1.stop(t+actualDur);saw2.stop(t+actualDur);sub.stop(t+actualDur);lfo.stop(t+actualDur);
  if(saw3)saw3.stop(t+actualDur);
  if(sq)sq.stop(t+actualDur);
  if(filterLfo)filterLfo.stop(t+actualDur);
}

var fcAmbZones=[

function initAmbient(){
  if(!actx)return;
  ambZones.forEach(function(z){
    if(z[6]){loadAmbFile(z[0],z[6],z[5]);}
    else{makeNoise(z[0],z[3],z[4],z[5]);}
  });
  // Countryside zones: only load if a URL is provided. No synthesis fallback
  // (synth noise summed across 8 zones sounds like a background drone).
  cyAmbZones.forEach(function(z){
    if(z[6]){loadAmbFile(z[0],z[6],z[5]);}
  });
  // Future zones (same rule - only load if url provided)
  fcAmbZones.forEach(function(z){
    if(z[6]){loadAmbFile(z[0],z[6],z[5]);}
  });
}
function getAmbientVol(gx,gy){
  var px=ix(gx,gy)*zScale+camX,py=iy(gx,gy)*zScale+camY;
  var cx2=sc.clientWidth/2,cy2=sc.clientHeight/2;
  var dist=Math.sqrt((px-cx2)*(px-cx2)+(py-cy2)*(py-cy2));
  var maxDist=Math.sqrt(cx2*cx2+cy2*cy2)*1.5;
  return Math.max(0,1-dist/maxDist);
}
function isPointVisible(gx,gy){var px=ix(gx,gy)*zScale+camX,py=iy(gx,gy)*zScale+camY;return px>-50&&px<sc.clientWidth+50&&py>-50&&py<sc.clientHeight+50;}
function updateAmbient(){
  if(!actx)return;
  // City zones: audible only when on city map
  ambZones.forEach(function(z){
    var node=ambNodes[z[0]];if(!node)return;
    if(currentMap!=='city'){
      node.gain.gain.linearRampToValueAtTime(.0001,actx.currentTime+.3);
      return;
    }
    var masterVol=Math.max(.12,Math.min(1,(zScale-.7)/1.3+.12));
    var distVol;
    if(z[0]==='river'){
      var rv=Math.max(getAmbientVol(10,22.5),getAmbientVol(25,22.5),getAmbientVol(40,22.5),getAmbientVol(55,22.5),getAmbientVol(70,22.5));
      distVol=rv;
    }else{
      distVol=getAmbientVol(z[1],z[2]);
    }
    var target=node.baseVol*masterVol*.7*distVol*(isDay?.05:1);
    node.gain.gain.linearRampToValueAtTime(Math.max(.0001,target),actx.currentTime+.3);
  });
  // Countryside zones: audible only when on countryside map
  cyAmbZones.forEach(function(z){
    var node=ambNodes[z[0]];if(!node)return;
    if(currentMap!=='countryside'){
      node.gain.gain.linearRampToValueAtTime(.0001,actx.currentTime+.3);
      return;
    }
    var masterVol=Math.max(.12,Math.min(1,(zScale-.7)/1.3+.12));
    var distVol;
    if(z[0]==='stream'){
      // multi-sample along the meandering stream (similar to city's river)
      var rv=Math.max(
        getAmbientVol(10,cyStreamCenterY(10)),
        getAmbientVol(25,cyStreamCenterY(25)),
        getAmbientVol(40,cyStreamCenterY(40)),
        getAmbientVol(55,cyStreamCenterY(55)),
        getAmbientVol(70,cyStreamCenterY(70))
      );
      distVol=rv;
    }else{
      distVol=getAmbientVol(z[1],z[2]);
    }
    var target=node.baseVol*masterVol*.7*distVol*(isDay?.05:1);
    node.gain.gain.linearRampToValueAtTime(Math.max(.0001,target),actx.currentTime+.3);
  });
  // Future zones: audible only on future map. Single zone covering whole map,
  // so no distance attenuation - constant volume regardless of pan/zoom.
  fcAmbZones.forEach(function(z){
    var node=ambNodes[z[0]];if(!node)return;
    if(currentMap!=='future'){
      node.gain.gain.linearRampToValueAtTime(.0001,actx.currentTime+.3);
      return;
    }
    var masterVol=Math.max(.12,Math.min(1,(zScale-.7)/1.3+.12));
    var target=node.baseVol*masterVol*.45*(isDay?.05:1);
    node.gain.gain.linearRampToValueAtTime(Math.max(.0001,target),actx.currentTime+.3);
  });
}
