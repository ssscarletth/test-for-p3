var isDay=false;
function doDayNight(){
  isDay=true;
  // Reset city
  for(var i=0;i<buildings.length;i++){
    bldgState[i]=0;
    if(bldgTimers[i]){clearTimeout(bldgTimers[i]);bldgTimers[i]=null;}
  }
  // Reset countryside
  for(var i=0;i<cyBuildings.length;i++){
    cyBldgState[i]=0;
    if(cyBldgTimers[i]){clearTimeout(cyBldgTimers[i]);cyBldgTimers[i]=null;}
  }
  // Reset future city
  for(var i=0;i<fcBuildings.length;i++){
    fcBldgState[i]=0;
    if(fcBldgTimers[i]){clearTimeout(fcBldgTimers[i]);fcBldgTimers[i]=null;}
  }
  document.body.style.background='#a0c0e0';
  // Reshuffle city notes
  var shuffled=[];for(var j=0;j<buildings.length;j++)shuffled.push(j);
  for(var k=shuffled.length-1;k>0;k--){var r=Math.floor(Math.random()*(k+1));var tmp=shuffled[k];shuffled[k]=shuffled[r];shuffled[r]=tmp;}
  window._noteMap=shuffled;
  // Reshuffle countryside notes
  var cyShuffled=[];for(var j=0;j<cyBuildings.length;j++)cyShuffled.push(j);
  for(var k=cyShuffled.length-1;k>0;k--){var r=Math.floor(Math.random()*(k+1));var tmp=cyShuffled[k];cyShuffled[k]=cyShuffled[r];cyShuffled[r]=tmp;}
  window._cyNoteMap=cyShuffled;
  // Reshuffle future notes
  var fcShuffled=[];for(var j=0;j<fcBuildings.length;j++)fcShuffled.push(j);
  for(var k=fcShuffled.length-1;k>0;k--){var r=Math.floor(Math.random()*(k+1));var tmp=fcShuffled[k];fcShuffled[k]=fcShuffled[r];fcShuffled[r]=tmp;}
  window._fcNoteMap=fcShuffled;
  setTimeout(function(){document.body.style.background='#2a3040';isDay=false;},2000);
}

// ===== CLICK =====
function handleClick(e){
  if(isDay)return;
  if(currentMap!=='city'&&currentMap!=='countryside'&&currentMap!=='future')return;
  initAudio();initAmbient();
  var _h=document.getElementById('hint');if(_h)_h.style.opacity='0';
  var rect=sc.getBoundingClientRect();
  var mx=(e.clientX-rect.left-camX)/zScale;
  var my=(e.clientY-rect.top-camY)/zScale;
  var best=-1,bestD=Infinity;
  if(currentMap==='city'){
    buildings.forEach(function(b,bi){
      var c=CFGS[b[2]%CFGS.length];
      var bx=ix(b[0]+c.w/2,b[1]+c.d/2),by=iy(b[0]+c.w/2,b[1]+c.d/2)-c.h/2;
      var d=Math.sqrt((mx-bx)*(mx-bx)+(my-by)*(my-by));
      var hitR=Math.max(30,c.h*.4);
      if(d<hitR&&d<bestD){bestD=d;best=bi;}
    });
    if(best>=0)toggleBuilding(best);
  }else if(currentMap==='countryside'){
    cyBuildings.forEach(function(b,bi){
      var w=b[3],d=b[4],h=b[2]===1?12:8.5;
      var bx=ix(b[0]+w/2,b[1]+d/2),by=iy(b[0]+w/2,b[1]+d/2)-h/2;
      var dd=Math.sqrt((mx-bx)*(mx-bx)+(my-by)*(my-by));
      var hitR=Math.max(28,h*.5);
      if(dd<hitR&&dd<bestD){bestD=dd;best=bi;}
    });
    if(best>=0)toggleCyBuilding(best);
  }else{
    // future city
    fcBuildings.forEach(function(b,bi){
      var w=b[3], d=b[4], hScale=b[5]||1;
      var isDiamond=bi>=fcTriBuildings.length;
      var bLift=isDiamond?FC_DIAMOND_LIFT:0;
      // approximate building height + hit-center offset by type
      var h, hitOffset;
      if(b[2]===0){       // capsule - center is midbody
        h=(10+Math.min(w,d)*1.5)*hScale;
        hitOffset=h/2;
      }else if(b[2]===1){ // invPyramid - VISUAL center is near the TOP (wide top)
        h=(12+w)*hScale;
        hitOffset=h*0.75; // shift hit center higher
      }else if(b[2]===2){ // disc - very flat, lives near float height
        h=8;
        hitOffset=h*0.4;
      }else{              // crystal - tall, center mid
        h=(18+w*1.5)*hScale;
        hitOffset=h/2;
      }
      var bx=ix(b[0]+w/2,b[1]+d/2);
      var by=iy(b[0]+w/2,b[1]+d/2)-hitOffset-bLift;
      var dd=Math.sqrt((mx-bx)*(mx-bx)+(my-by)*(my-by));
      // larger hitbox - especially helpful for buildings near platform edge
      var hitR=Math.max(34,h*.55);
      if(dd<hitR&&dd<bestD){bestD=dd;best=bi;}
    });
    if(best>=0)toggleFcBuilding(best);
  }
}

var zScale=0.7,camX=0,camY=0,isDrag=false,lastX=0,lastY=0,dragMoved=false,isDiving=false;
function applyView(){cv.style.transform='translate('+camX+'px,'+camY+'px) scale('+zScale+')';updateAmbient();}
function getMinZoom(){
  // Each map has a different overview zoom level - that's also the minimum
  // zoom (can't shrink below it). Countryside and future are smaller maps
  // and shouldn't be allowed to zoom out below their overview size.
  if(currentMap==='countryside')return 1.0;
  if(currentMap==='future')return 1.25;
  return 0.7; // city (or null splash)
}
function doZm(f){initAudio();initAmbient();var cx2=sc.clientWidth/2,cy2=sc.clientHeight/2;var ns=Math.max(getMinZoom(),Math.min(4,zScale*f));camX=cx2-(cx2-camX)*(ns/zScale);camY=cy2-(cy2-camY)*(ns/zScale);zScale=ns;applyView();}
sc.onmousedown=function(e){if(isDiving)return;isDrag=true;dragMoved=false;lastX=e.clientX;lastY=e.clientY;sc.className='dr';};
window.onmousemove=function(e){if(!isDrag)return;var dx=e.clientX-lastX,dy=e.clientY-lastY;if(Math.abs(dx)>3||Math.abs(dy)>3)dragMoved=true;camX+=dx;camY+=dy;lastX=e.clientX;lastY=e.clientY;applyView();};
window.onmouseup=function(e){if(!dragMoved&&isDrag)handleClick(e);isDrag=false;sc.className='';};
sc.onwheel=function(e){e.preventDefault();if(isDiving)return;initAudio();initAmbient();var r=sc.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;var ns=Math.max(getMinZoom(),Math.min(4,zScale*(e.deltaY>0?.93:1.08)));camX=mx-(mx-camX)*(ns/zScale);camY=my-(my-camY)*(ns/zScale);zScale=ns;applyView();};
sc.ontouchstart=function(e){if(isDiving)return;if(e.touches.length===1){isDrag=true;dragMoved=false;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}};
sc.ontouchmove=function(e){if(!isDrag||e.touches.length!==1)return;var dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY;if(Math.abs(dx)>3||Math.abs(dy)>3)dragMoved=true;camX+=dx;camY+=dy;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;applyView();};
sc.ontouchend=function(e){if(!dragMoved&&isDrag){var t=e.changedTouches[0];handleClick({clientX:t.clientX,clientY:t.clientY});}isDrag=false;};
camX=-fullW*zScale/2+sc.clientWidth/2;camY=-fullH*zScale/2+sc.clientHeight*0.7;applyView();

// ===== SPLASH FLOW =====
// Stage 1: title + ♪. Stage 2 (after ♪): three floating 3D lego thumbnails.
// Stage 3 (after lego click): camera zooms IN to landmark (max), holds 2s, then zooms OUT to overview.
var LANDMARKS={
  city:{gx:40,gy:40},
  countryside:{gx:40,gy:33},
  // future: zoom-in focus needs to be lifted so the tall central crystal tower
  // (sitting on the floating diamond platform) is fully in frame.
  future:{gx:40,gy:40, yLift:90}
};

function showChoices(){
  initAudio();initAmbient();
  document.getElementById('splash').classList.add('choosing');
  buildLego('city');
  buildLego('countryside');
  buildLego('future');
  // Only countryside (the middle one) needs arm-on-leave: when ♪ is clicked, the
  // cursor is in the center of the screen, directly over countryside, which would
  // otherwise bounce immediately. City and future are off-center and safe.
  var cs=document.getElementById('lego_countryside');
  if(cs){
    cs.classList.add('no-arm');
    cs.addEventListener('mouseleave',function once(){
      cs.classList.remove('no-arm');
      cs.removeEventListener('mouseleave',once);
    });
  }
}

function chooseMap(id){
  // Switch underlying map first (data, label, etc.)
  if(id!==currentMap)switchMap(id);
  var hint=document.getElementById('hint');if(hint)hint.style.opacity='0';
  // Stage 3 of splash flow: dramatic zoom-in to landmark, hold to hear ambient, then zoom-out to overview
  var lm=LANDMARKS[id];
  function viewAt(z,cx,cy,yLift){
    return {
      z:z,
      x:sc.clientWidth/2 - ix(cx,cy)*z,
      y:sc.clientHeight*0.55 - (iy(cx,cy)-(yLift||0))*z
    };
  }
  var MAP_CENTERS={
    city:{gx:40,gy:40},
    countryside:{gx:40,gy:50},
    future:{gx:40,gy:40}
  };
  var mc=MAP_CENTERS[id];
  var V_START={z:zScale,x:camX,y:camY};
  // Zoom-in focuses on landmark (with yLift for tall future tower)
  var V_CLOSE=viewAt(4.0,lm.gx,lm.gy,lm.yLift);
  var overviewZ=0.7;
  if(id==='countryside')overviewZ=1.0;
  else if(id==='future')overviewZ=1.25;  // future map is smaller → needs higher zoom
  var V_WIDE=viewAt(overviewZ,mc.gx,mc.gy);
  
  isDiving=true;
  // Fade out splash slightly faster so the zoom-in is visible behind it
  var splash=document.getElementById('splash');
  splash.style.opacity='0';
  setTimeout(function(){splash.style.display='none';},900);
  
  // Phase 1: START -> CLOSE (zoom in, 1.4s, easeInOutCubic)
  // Phase 2: HOLD at CLOSE (2s)
  // Phase 3: CLOSE -> WIDE (zoom out, 1.8s, easeInOutCubic)
  var t0=performance.now();
  var P1=1400,P2=2000,P3=1800;
  function easeInOutCubic(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
  function step(now){
    var elapsed=now-t0;
    if(elapsed<P1){
      var t=elapsed/P1,e=easeInOutCubic(t);
      zScale=V_START.z+(V_CLOSE.z-V_START.z)*e;
      camX=V_START.x+(V_CLOSE.x-V_START.x)*e;
      camY=V_START.y+(V_CLOSE.y-V_START.y)*e;
    }else if(elapsed<P1+P2){
      // hold at close — already there, but reassert in case of any drift
      zScale=V_CLOSE.z;camX=V_CLOSE.x;camY=V_CLOSE.y;
    }else if(elapsed<P1+P2+P3){
      var t=(elapsed-P1-P2)/P3,e=easeInOutCubic(t);
      zScale=V_CLOSE.z+(V_WIDE.z-V_CLOSE.z)*e;
      camX=V_CLOSE.x+(V_WIDE.x-V_CLOSE.x)*e;
      camY=V_CLOSE.y+(V_WIDE.y-V_CLOSE.y)*e;
    }else{
      zScale=V_WIDE.z;camX=V_WIDE.x;camY=V_WIDE.y;
      applyView();
      isDiving=false;
      if(hint)setTimeout(function(){hint.style.opacity='1';},150);
      return;
    }
    applyView();
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

var legoRenderers=[];
function buildLego(id){
  var container=document.getElementById('lego_'+id);
  if(!container||container.children.length>0)return;
  var W=150,H=170;
  var scene=new THREE.Scene();
  var camera=new THREE.OrthographicCamera(-W/2,W/2,H/2,-H/2,1,1000);
  camera.position.set(160,180,160);
  camera.lookAt(0,0,0);
  camera.zoom=3.4;
  camera.updateProjectionMatrix();
  
  // Pixel-art renderer: no antialiasing, fixed 1x pixel ratio for chunky edges
  // even on high-dpi screens. CSS image-rendering keeps pixels crisp when scaled.
  var renderer=new THREE.WebGLRenderer({antialias:false,alpha:true});
  renderer.setSize(W,H);
  renderer.setPixelRatio(1);
  renderer.domElement.style.width=W+'px';
  renderer.domElement.style.height=H+'px';
  renderer.domElement.style.display='block';
  renderer.domElement.style.imageRendering='pixelated';
  container.appendChild(renderer.domElement);
  
  // Lights
  var amb=new THREE.AmbientLight(0xffffff,0.55);
  scene.add(amb);
  var dir=new THREE.DirectionalLight(0xffffff,0.85);
  dir.position.set(50,80,30);
  scene.add(dir);
  
  function lambert(color){
    return new THREE.MeshLambertMaterial({color:color,flatShading:true});
  }
  function neon(color){
    return new THREE.MeshBasicMaterial({color:color});
  }
  function addBox(x,y,z,w,h,d,mat){

    rootGroup.add(m);
    return m;

  var rootGroup=new THREE.Group();

    ].forEach(function(b){

      // dark window dots (3x3 grid of small darker boxes on front face)

    var stripPink=new THREE.Mesh(new THREE.BoxGeometry(.3,18,.3),neon(0xe040c0));
    stripPink.position.set(3.1,11,3.1);rootGroup.add(stripPink);
    var stripCyan=new THREE.Mesh(new THREE.BoxGeometry(.3,18,.3),neon(0x40d8e0));
    stripCyan.position.set(-3.1,11,-3.1);rootGroup.add(stripCyan);
    // Window blocks
    for(var f=0;f<4;f++){
      if(Math.random()<.7){
        var col=Math.random()<.5?0xf060c8:0x40c8e0;
        var w=new THREE.Mesh(new THREE.BoxGeometry(2,1.2,.2),neon(col));
        w.position.set(0,4+f*4,3.15);rootGroup.add(w);
      }
    }
    // Pyramid top
    var pyr=new THREE.Mesh(new THREE.ConeGeometry(4.5,4.5,4),lambert(0x2a2240));
    pyr.position.set(0,24.25,0);pyr.rotation.y=Math.PI/4;rootGroup.add(pyr);
    // Antenna + blinker
    var ant=new THREE.Mesh(new THREE.BoxGeometry(.25,4,.25),lambert(0x3a3050));
    ant.position.set(0,28.5,0);rootGroup.add(ant);
    var blinker=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),neon(0xff4060));
    blinker.position.set(0,31,0);rootGroup.add(blinker);
    rootGroup.userData.blinker=blinker;
    // Smaller cylinder tower
    var cyl=new THREE.Mesh(new THREE.CylinderGeometry(2.5,2.5,14,12),lambert(0x1a1230));
    cyl.position.set(-10,7,8);rootGroup.add(cyl);
    var ring=new THREE.Mesh(new THREE.TorusGeometry(2.7,.2,6,16),neon(0x40c8e0));
    ring.position.set(-10,10,8);ring.rotation.x=Math.PI/2;rootGroup.add(ring);
    var ring2=new THREE.Mesh(new THREE.TorusGeometry(2.7,.2,6,16),neon(0xe040c0));
    ring2.position.set(-10,6,8);ring2.rotation.x=Math.PI/2;rootGroup.add(ring2);
    // Stepped low building
    addBox(9,0,-8,7,9,5,lambert(0x1c1428));
    addBox(9,9,-8,5,4,4,lambert(0x241c34));
  }
  
  // Animate rotation + blinker pulse + windmill spin
  function animate(){
    var t=performance.now()*0.0006;
    var seedOffset=id==='city'?0:(id==='countryside'?2.1:4.2);
    rootGroup.rotation.y=Math.sin(t+seedOffset)*0.35;
    rootGroup.rotation.x=Math.sin(t*0.7+seedOffset)*0.06;
    // windmill blade spin
    if(rootGroup.userData.blades){
      rootGroup.userData.blades.rotation.z=performance.now()*0.0015;
    }
    // future blinker pulse
    if(rootGroup.userData.blinker){
      var pulse=0.5+0.5*Math.sin(performance.now()*0.005);
      rootGroup.userData.blinker.material.color.setRGB(1,0.25*pulse,0.38*pulse);
    }
    renderer.render(scene,camera);
    requestAnimationFrame(animate);
  }
  legoRenderers.push(renderer);
  animate();
}

  // legacy fallback - delegate to chooseMap
  chooseMap('city');
