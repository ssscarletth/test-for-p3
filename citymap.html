<script>

function bldgWins(gx,gy,w,d,h,fl,wc,fc){var tr=[ix(gx+w,gy),iy(gx+w,gy)],br=[ix(gx+w,gy+d),iy(gx+w,gy+d)],bl=[ix(gx,gy+d),iy(gx,gy+d)];var fH=h/fl;for(var f=0;f<fl;f++){var nc=Math.max(2,Math.floor(w*1.2));for(var c2=0;c2<nc;c2++){var t=(c2+.5)/nc,wh=fH*.4,wx,wy;wx=tr[0]+(br[0]-tr[0])*t;wy=tr[1]+(br[1]-tr[1])*t-f*fH-fH*.55;C.fillStyle=fc;C.fillRect(wx-3,wy-wh/2-1,6,wh+2);C.fillStyle=wc;C.fillRect(wx-2,wy-wh/2,4,wh);wx=bl[0]+(br[0]-bl[0])*t;wy=bl[1]+(br[1]-bl[1])*t-f*fH-fH*.55;C.fillStyle=fc;C.fillRect(wx-3,wy-wh/2-1,5,wh+2);C.fillStyle=wc;C.fillRect(wx-2,wy-wh/2,3.5,wh);}}}
function pkRoof(gx,gy,w,d,h,rH,rc){var tl=[ix(gx,gy),iy(gx,gy)-h],tr=[ix(gx+w,gy),iy(gx+w,gy)-h],bl=[ix(gx,gy+d),iy(gx,gy+d)-h],br=[ix(gx+w,gy+d),iy(gx+w,gy+d)-h];var rt=[(tl[0]+tr[0])/2,(tl[1]+tr[1])/2-rH],rb=[(bl[0]+br[0])/2,(bl[1]+br[1])/2-rH];quad(tl,rt,tr,tl,rc[0]);quad(tr,rt,rb,br,rc[1]);quad(bl,rb,br,bl,rc[2]);quad(tl,rt,rb,bl,rc[2]);quad(tr,[tr[0],tr[1]+3],[br[0],br[1]+3],br,rc[2]);}
function ftRoof(gx,gy,w,d,h,rc){var tl=[ix(gx,gy),iy(gx,gy)],tr=[ix(gx+w,gy),iy(gx+w,gy)],bl=[ix(gx,gy+d),iy(gx,gy+d)],br=[ix(gx+w,gy+d),iy(gx+w,gy+d)];quad([tl[0],tl[1]-h],[tr[0],tr[1]-h],[br[0],br[1]-h],[bl[0],bl[1]-h],rc[0]);quad([tr[0],tr[1]-h-3],[br[0],br[1]-h-3],[br[0],br[1]-h],[tr[0],tr[1]-h],rc[1]);quad([br[0],br[1]-h-3],[bl[0],bl[1]-h-3],[bl[0],bl[1]-h],[br[0],br[1]-h],rc[2]);}

  var c=CFGS[type%CFGS.length],p=lit?PL[(lit-1)%PL.length]:PU;

function drawLamp(gx,gy){var x=ix(gx,gy),y=iy(gx,gy);C.fillStyle='#1e2e48';C.fillRect(x-1,y-20,2,20);C.fillStyle='#2a3a58';C.fillRect(x-3,y-22,6,2.5);C.fillStyle='#ffdd8815';C.beginPath();C.arc(x,y-20,6,0,Math.PI*2);C.fill();C.fillStyle='#2a3a58';C.fillRect(x-2.5,y-1,5,3);}
function drawCar(gx,gy,col){var x=ix(gx,gy),y=iy(gx,gy);C.fillStyle=col;C.beginPath();C.moveTo(x-8,y-1);C.lineTo(x+8,y+3);C.lineTo(x+10,y+2);C.lineTo(x+8,y+1);C.lineTo(x-8,y-3);C.closePath();C.fill();C.fillRect(x-3,y-4,7,3);C.fillStyle='#88b8d8';C.fillRect(x-2,y-3.5,2.5,2);C.fillRect(x+1,y-3.5,2.5,2);C.fillStyle='#333';C.beginPath();C.arc(x-5,y+1,2,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+5,y+2,2,0,Math.PI*2);C.fill();}

var actx=null;
function initAudio(){if(actx)return;actx=new(window.AudioContext||window.webkitAudioContext)();}
function playNote(freq,dur){if(!actx)return;var t=actx.currentTime;var osc=actx.createOscillator(),mod=actx.createOscillator(),modG=actx.createGain(),g=actx.createGain();mod.frequency.value=freq*2;modG.gain.value=freq*.5;mod.connect(modG);modG.connect(osc.frequency);osc.type='sine';osc.frequency.value=freq;var vol=Math.min(.25,(zScale-.5)*.15);if(vol<.01)vol=.01;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);osc.connect(g);g.connect(actx.destination);mod.start(t);osc.start(t);osc.stop(t+dur);mod.stop(t+dur);}
var NOTES=[261.6,293.7,329.6,392,440,523.3,587.3,659.3,784,880,1047,1175];
var bldgTimers=buildings.map(function(){return null;});
function isBldgVisible(bi){
  var b=buildings[bi],c=CFGS[b[2]%CFGS.length];
  var px=ix(b[0]+c.w/2,b[1]+c.d/2)*zScale+camX;
  var py=(iy(b[0]+c.w/2,b[1]+c.d/2)-c.h/2)*zScale+camY;
  return px>-150&&px<sc.clientWidth+150&&py>-150&&py<sc.clientHeight+150;
}
function scheduleNote(bi,note,baseInterval){
  if(!bldgState[bi])return;
  var jitter=baseInterval*(.4+Math.random()*1.2);
  bldgTimers[bi]=setTimeout(function(){
    if(!bldgState[bi])return;
    if(isBldgVisible(bi)){
      playNote(note*(1+Math.random()*.03-.015),.3+Math.random()*.6);
    }
    scheduleNote(bi,note,baseInterval);
  },jitter);
}
function toggleBuilding(bi){initAudio();if(bldgState[bi]){bldgState[bi]=0;if(bldgTimers[bi]){clearTimeout(bldgTimers[bi]);bldgTimers[bi]=null;}}else{var noteIdx=(window._noteMap?window._noteMap[bi]:bi)%NOTES.length;bldgState[bi]=1+noteIdx;var note=NOTES[noteIdx];playNote(note,.8);var bases=[800,1200,1800,2400,3200,4000,1400,2000,600,1000,2800,1600];scheduleNote(bi,note,bases[bi%bases.length]);}render();}

// Ambient - supports both generated noise and audio files
// To use audio files: set url property in ambZones entries
// Files should be .mp3 or .ogg, will loop automatically
var ambNodes={};
function makeNoise(name,freq,q,vol){
  if(!actx||ambNodes[name])return;
  var bufSz=actx.sampleRate*2,buf=actx.createBuffer(1,bufSz,actx.sampleRate),data=buf.getChannelData(0);
  for(var i=0;i<bufSz;i++)data[i]=Math.random()*2-1;
  var src=actx.createBufferSource();src.buffer=buf;src.loop=true;
  var filt=actx.createBiquadFilter();filt.type='bandpass';filt.frequency.value=freq;filt.Q.value=q;
  var g=actx.createGain();g.gain.value=0;
  src.connect(filt);filt.connect(g);g.connect(actx.destination);src.start();
  ambNodes[name]={gain:g,baseVol:vol};
}
function loadAmbFile(name,url,vol){
  if(!actx||ambNodes[name])return;
  var g=actx.createGain();g.gain.value=0;g.connect(actx.destination);
  ambNodes[name]={gain:g,baseVol:vol,loading:true};
  fetch(url).then(function(r){return r.arrayBuffer();}).then(function(ab){
    return actx.decodeAudioData(ab);
  }).then(function(decoded){
    var src=actx.createBufferSource();src.buffer=decoded;src.loop=true;
    src.connect(g);src.start();
    ambNodes[name].loading=false;
  }).catch(function(e){console.warn('Audio load failed:',name,e);});
}

function getAmbientVol(gx,gy){
  var px=ix(gx,gy)*zScale+camX,py=iy(gx,gy)*zScale+camY;
  var cx2=sc.clientWidth/2,cy2=sc.clientHeight/2;
  var dist=Math.sqrt((px-cx2)*(px-cx2)+(py-cy2)*(py-cy2));
  var maxDist=Math.sqrt(cx2*cx2+cy2*cy2)*1.5;
  return Math.max(0,1-dist/maxDist);
}
function isPointVisible(gx,gy){var px=ix(gx,gy)*zScale+camX,py=iy(gx,gy)*zScale+camY;return px>-50&&px<sc.clientWidth+50&&py>-50&&py<sc.clientHeight+50;}
function updateAmbient(){if(!actx)return;var masterVol=Math.max(0,Math.min(1,(zScale-.7)/1.3));ambZones.forEach(function(z){var node=ambNodes[z[0]];if(!node)return;var distVol;if(z[0]==='river'){var rv=Math.max(getAmbientVol(10,22.5),getAmbientVol(25,22.5),getAmbientVol(40,22.5),getAmbientVol(55,22.5),getAmbientVol(70,22.5));distVol=rv;}else{distVol=getAmbientVol(z[1],z[2]);}var target=node.baseVol*masterVol*.7*distVol*(isDay?.05:1);node.gain.gain.linearRampToValueAtTime(Math.max(.0001,target),actx.currentTime+.3);});}

// ===== DAY/NIGHT =====
var isDay=false;
function doDayNight(){
  isDay=true;
  for(var i=0;i<buildings.length;i++){
    bldgState[i]=0;
    if(bldgTimers[i]){clearTimeout(bldgTimers[i]);bldgTimers[i]=null;}
  }
  render();
  document.body.style.background='#a0c0e0';
  var shuffled=[];for(var j=0;j<buildings.length;j++)shuffled.push(j);
  for(var k=shuffled.length-1;k>0;k--){var r=Math.floor(Math.random()*(k+1));var tmp=shuffled[k];shuffled[k]=shuffled[r];shuffled[r]=tmp;}
  window._noteMap=shuffled;
  setTimeout(function(){document.body.style.background='#2a3040';isDay=false;},2000);
}

// ===== CLICK =====
function handleClick(e){if(isDay)return;initAudio();initAmbient();document.getElementById('hint').style.opacity='0';var rect=sc.getBoundingClientRect(),mx=(e.clientX-rect.left-camX)/zScale,my=(e.clientY-rect.top-camY)/zScale;var best=-1,bestD=Infinity;buildings.forEach(function(b,bi){var c=CFGS[b[2]%CFGS.length];var bx=ix(b[0]+c.w/2,b[1]+c.d/2),by=iy(b[0]+c.w/2,b[1]+c.d/2)-c.h/2;var d=Math.sqrt((mx-bx)*(mx-bx)+(my-by)*(my-by));var hitR=Math.max(30,c.h*.4);if(d<hitR&&d<bestD){bestD=d;best=bi;}});if(best>=0)toggleBuilding(best);}

// ===== PAN & ZOOM =====
var zScale=0.7,camX=0,camY=0,isDrag=false,lastX=0,lastY=0,dragMoved=false;
function applyView(){cv.style.transform='translate('+camX+'px,'+camY+'px) scale('+zScale+')';updateAmbient();}
function doZm(f){initAudio();initAmbient();var cx2=sc.clientWidth/2,cy2=sc.clientHeight/2;var ns=Math.max(.7,Math.min(4,zScale*f));camX=cx2-(cx2-camX)*(ns/zScale);camY=cy2-(cy2-camY)*(ns/zScale);zScale=ns;applyView();}
sc.onmousedown=function(e){isDrag=true;dragMoved=false;lastX=e.clientX;lastY=e.clientY;sc.className='dr';};
window.onmousemove=function(e){if(!isDrag)return;var dx=e.clientX-lastX,dy=e.clientY-lastY;if(Math.abs(dx)>3||Math.abs(dy)>3)dragMoved=true;camX+=dx;camY+=dy;lastX=e.clientX;lastY=e.clientY;applyView();};
window.onmouseup=function(e){if(!dragMoved&&isDrag)handleClick(e);isDrag=false;sc.className='';};
sc.onwheel=function(e){e.preventDefault();initAudio();initAmbient();var r=sc.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;var ns=Math.max(.7,Math.min(4,zScale*(e.deltaY>0?.93:1.08)));camX=mx-(mx-camX)*(ns/zScale);camY=my-(my-camY)*(ns/zScale);zScale=ns;applyView();};
sc.ontouchstart=function(e){if(e.touches.length===1){isDrag=true;dragMoved=false;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}};
sc.ontouchmove=function(e){if(!isDrag||e.touches.length!==1)return;var dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY;if(Math.abs(dx)>3||Math.abs(dy)>3)dragMoved=true;camX+=dx;camY+=dy;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;applyView();};
sc.ontouchend=function(e){if(!dragMoved&&isDrag){var t=e.changedTouches[0];handleClick({clientX:t.clientX,clientY:t.clientY});}isDrag=false;};
render();camX=-fullW*zScale/2+sc.clientWidth/2;camY=-fullH*zScale/2+sc.clientHeight*0.7;applyView();
setInterval(updateAmbient,500);

function enterCity(){
  initAudio();initAmbient();
  var splash=document.getElementById('splash');
  splash.style.opacity='0';
  setTimeout(function(){splash.style.display='none';},1200);
}

(function(){var s=document.getElementById('stars');for(var i=0;i<40;i++){var d=document.createElement('div');d.className='star';d.style.left=Math.random()*100+'%';d.style.top=Math.random()*100+'%';var sz=Math.random()>0.7?3:2;d.style.width=sz+'px';d.style.height=sz+'px';d.style.animationDelay=Math.random()*3+'s';d.style.animationDuration=(1.5+Math.random()*2)+'s';s.appendChild(d);}})();
</script></body></html>
